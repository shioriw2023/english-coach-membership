<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英語コーチング | ログイン</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card fade-in">

      <span class="login-eyebrow">Members Only</span>
      <h1 class="login-title">英語コーチング<br>受講生マイページ</h1>
      <p class="login-subtitle">メールアドレスでログインしてください</p>

      <!-- Step 1: メアド＋パスワードログイン -->
      <div id="step-login">
        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input type="email" id="input-email" class="form-input" placeholder="例：hanako@example.com"
            onkeydown="if(event.key==='Enter') document.getElementById('input-password').focus()">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <input type="password" id="input-password" class="form-input" placeholder="パスワードを入力"
            onkeydown="if(event.key==='Enter') handleLogin()">
        </div>
        <div id="login-error" class="alert alert-error" style="display:none;"></div>
        <button class="btn btn-primary btn-full" onclick="handleLogin()">ログイン</button>
      </div>

      <!-- Step 2: 初回パスワード設定（セットアップリンク経由） -->
      <div id="step-setup" style="display:none;">
        <div class="alert alert-info" style="margin-bottom:20px;">
          ようこそ！はじめにパスワードを設定してください。
        </div>
        <p style="font-size:15px; font-weight:700; color:var(--text); margin-bottom:20px;" id="setup-name-display"></p>
        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input type="email" id="setup-email-display" class="form-input" readonly
            style="background:var(--bg-alt,#f5f5f5);color:var(--text-muted);">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード（6文字以上）</label>
          <input type="password" id="input-new-pw" class="form-input" placeholder="パスワードを設定">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード（確認）</label>
          <input type="password" id="input-confirm-pw" class="form-input" placeholder="もう一度入力">
        </div>
        <div id="setup-error" class="alert alert-error" style="display:none;"></div>
        <button class="btn btn-primary btn-full" onclick="handleSetup()">パスワードを設定してはじめる</button>
      </div>

      <!-- Loading -->
      <div id="step-loading" style="display:none;">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/config.js"></script>
  <script>
    let currentUserDoc = null;

    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    // URL setup パラメータ処理
    window.addEventListener('load', async () => {
      const params = new URLSearchParams(location.search);
      const setupId = params.get('setup');
      if (!setupId) return;
      showStep('step-loading');
      try {
        const docSnap = await db.collection('users').doc(setupId).get();
        if (!docSnap.exists || docSnap.data().setupDone) {
          showStep('step-login');
          return;
        }
        currentUserDoc = { id: docSnap.id, ...docSnap.data() };
        document.getElementById('setup-name-display').textContent = `${currentUserDoc.name} さんとして登録します`;
        document.getElementById('setup-email-display').value = currentUserDoc.email || '';
        showStep('step-setup');
      } catch(e) {
        showStep('step-login');
      }
    });

    function showStep(id) {
      ['step-login','step-setup','step-loading'].forEach(s => {
        document.getElementById(s).style.display = 'none';
      });
      document.getElementById(id).style.display = 'block';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideError(id) {
      document.getElementById(id).style.display = 'none';
    }

    async function handleLogin() {
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;
      if (!email)    { showError('login-error', 'メールアドレスを入力してください'); return; }
      if (!password) { showError('login-error', 'パスワードを入力してください'); return; }
      hideError('login-error');
      showStep('step-loading');
      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch(e) {
        showStep('step-login');
        showError('login-error', 'メールアドレスまたはパスワードが間違っています');
      }
    }

    async function handleSetup() {
      const pw  = document.getElementById('input-new-pw').value;
      const pw2 = document.getElementById('input-confirm-pw').value;
      hideError('setup-error');
      if (pw.length < 6) { showError('setup-error', 'パスワードは6文字以上で設定してください'); return; }
      if (pw !== pw2)    { showError('setup-error', 'パスワードが一致しません'); return; }
      showStep('step-loading');
      try {
        await auth.createUserWithEmailAndPassword(currentUserDoc.email, pw);
        await db.collection('users').doc(currentUserDoc.id).update({ setupDone: true });
      } catch(e) {
        showStep('step-setup');
        if (e.code === 'auth/email-already-in-use') {
          showError('setup-error', 'このアカウントはすでに設定済みです。ログインページからログインしてください。');
        } else {
          showError('setup-error', 'エラーが発生しました: ' + e.message);
        }
      }
    }
  </script>
</body>
</html>
