<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音読練習</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F8F2;
      --white: #FFFFFF;
      --text: #1A1419;
      --text-muted: #8A9A82;
      --accent: #6B8C5A;
      --accent-hover: #578048;
      --accent-light: #EBF3E6;
      --border: rgba(0,0,0,0.08);
      --radius: 8px;
      --radius-lg: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
    }

    /* ===== HEADER ===== */
    .app-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--accent);
      background: none; border: none; font-family: inherit;
      cursor: pointer; text-decoration: none;
    }
    .header-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .header-badge {
      font-size: 11px; background: var(--accent-light); color: var(--accent);
      padding: 3px 10px; border-radius: 20px; font-weight: 500;
    }

    /* ===== LEVEL TOGGLE ===== */
    .level-toggle-wrap {
      max-width: 600px; margin: 0 auto;
      padding: 20px 16px 0;
    }
    .level-toggle {
      display: flex; background: var(--white);
      border-radius: var(--radius); border: 1px solid var(--border);
      overflow: hidden;
    }
    .level-btn {
      flex: 1; padding: 10px 0; font-size: 13px; font-weight: 600;
      font-family: inherit; border: none; cursor: pointer;
      background: none; color: var(--text-muted);
      transition: all 0.15s;
    }
    .level-btn.active { background: var(--accent); color: #fff; }

    /* ===== MAIN WRAP ===== */
    .main-wrap { max-width: 600px; margin: 0 auto; padding: 20px 16px 48px; }

    /* ===== PROGRESS ===== */
    .progress-section { margin-bottom: 20px; }
    .progress-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .progress-label { font-size: 12px; color: var(--text-muted); }
    .progress-count { font-size: 13px; font-weight: 700; color: var(--accent); }
    .progress-bar-bg {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* ===== SENTENCE CARD ===== */
    .sentence-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      margin-bottom: 16px;
    }
    .set-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 6px;
    }
    .sentence-num {
      font-size: 11px; color: var(--text-muted);
      margin-bottom: 16px;
    }
    .sentence-en {
      font-family: 'Inter', sans-serif;
      font-size: 22px; font-weight: 500; color: var(--text);
      line-height: 1.5; margin-bottom: 12px;
      letter-spacing: 0.01em;
    }
    .sentence-ja {
      font-size: 14px; color: var(--text-muted); line-height: 1.7;
      margin-bottom: 14px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sentence-tip {
      font-size: 12px; color: var(--accent);
      display: flex; align-items: flex-start; gap: 6px; line-height: 1.6;
    }
    .tip-icon { flex-shrink: 0; }

    /* ===== BUTTONS ===== */
    .btn-next {
      width: 100%; padding: 14px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
      letter-spacing: 0.03em;
    }
    .btn-next:hover { background: var(--accent-hover); }

    /* ===== COMPLETE SCREEN ===== */
    .complete-screen {
      display: none; text-align: center;
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow); padding: 48px 24px;
    }
    .complete-screen.show { display: block; }
    .complete-icon { font-size: 48px; margin-bottom: 16px; }
    .complete-title {
      font-size: 22px; font-weight: 700; color: var(--text);
      margin-bottom: 8px;
    }
    .complete-sub { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-bottom: 28px; }
    .complete-stats {
      display: flex; justify-content: center; gap: 24px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: var(--accent-light); border-radius: var(--radius);
      padding: 14px 20px; text-align: center;
    }
    .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .btn-retry {
      display: inline-block; padding: 12px 32px;
      border: 2px solid var(--accent); border-radius: var(--radius);
      font-size: 14px; font-weight: 600; font-family: inherit;
      color: var(--accent); background: none; cursor: pointer;
      transition: all 0.15s; margin-right: 8px;
    }
    .btn-retry:hover { background: var(--accent-light); }
    .btn-home-link {
      display: inline-block; padding: 12px 32px;
      background: var(--accent); border-radius: var(--radius);
      font-size: 14px; font-weight: 600; font-family: inherit;
      color: #fff; border: none; cursor: pointer;
      text-decoration: none; transition: background 0.15s;
    }
    .btn-home-link:hover { background: var(--accent-hover); }

    /* ===== PRACTICE SCREEN WRAP ===== */
    .practice-wrap { display: none; }
    .practice-wrap.show { display: block; }
    .start-wrap { display: block; }
    .start-wrap.hidden { display: none; }
  </style>
</head>
<body>

<header class="app-header">
  <a href="preview-c-dashboard.html" class="header-back">← タスク一覧に戻る</a>
  <span class="header-title">音読練習</span>
  <span class="header-badge" id="header-badge">初級</span>
</header>


<div class="main-wrap">

  <!-- スタート前 -->
  <div class="start-wrap" id="start-wrap" style="text-align:center;padding:32px 0;">
    <div style="font-size:36px;margin-bottom:16px;">📖</div>
    <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;">音読練習</div>
    <div style="font-size:13px;color:var(--text-muted);line-height:1.8;margin-bottom:8px;">
      500文からランダムに30文を出題します。<br>
      英文・日本語訳・音読のポイントを確認しながら<br>
      声に出して読みましょう。
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:28px;">⏱ 目安 15分</div>
    <button class="btn-next" style="max-width:280px;margin:0 auto;" onclick="startPractice()">練習を始める</button>
  </div>

  <!-- 練習画面 -->
  <div class="practice-wrap" id="practice-wrap">
    <div class="progress-section">
      <div class="progress-row">
        <span class="progress-label" id="set-label-top">セット 1 / 6</span>
        <span class="progress-count" id="progress-count">1 / 15</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar" style="width:6.7%"></div>
      </div>
    </div>

    <div class="sentence-card" id="sentence-card">
      <div class="set-label" id="set-label">SET 1</div>
      <div class="sentence-num" id="sentence-num">1文目 / 5文</div>
      <div class="sentence-en" id="sentence-en">—</div>
      <div class="sentence-ja" id="sentence-ja">—</div>
      <div class="sentence-tip">
        <span class="tip-icon">💡</span>
        <span id="sentence-tip">—</span>
      </div>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextSentence()">次へ →</button>
  </div>

  <!-- 完了画面 -->
  <div class="complete-screen" id="complete-screen">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">お疲れ様でした！</div>
    <div class="complete-sub">30文すべて読み終えました。<br>毎日続けることで発音がぐんぐん上達します！</div>
    <div class="complete-stats">
      <div class="stat-box">
        <div class="stat-val">30</div>
        <div class="stat-label">文</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">6</div>
        <div class="stat-label">セット</div>
      </div>
    </div>
    <button class="btn-retry" onclick="retryPractice()">もう一度</button>
    <a href="preview-c-dashboard.html" class="btn-home-link">タスク一覧へ</a>
  </div>

</div>

<script>
var ALL_SENTENCES = [
    { en: "Good morning! How are you?", ja: "おはようございます！お元気ですか？", tip: "「Good morning」の d は軽く、「are you」はつなげて自然に読みましょう。" },
    { en: "I drink coffee every morning.", ja: "私は毎朝コーヒーを飲みます。", tip: "「drink」の dr は舌を巻かず前歯の裏から。「every」は2音節（エブリ）で。" },
    { en: "What time is it now?", ja: "今、何時ですか？", tip: "「What time」をひとまとまりで。語尾を上げて質問らしく読みましょう。" },
    { en: "I live in Tokyo.", ja: "私は東京に住んでいます。", tip: "「live」の i は短母音（リヴ）。「Tokyo」は英語では /toʊkioʊ/ と発音します。" },
    { en: "My name is Yuki.", ja: "私の名前はゆきです。", tip: "シンプルな自己紹介文。名前の前に一瞬ポーズを置くと自然に聞こえます。" },
    { en: "I like music very much.", ja: "私は音楽がとても好きです。", tip: "「music」は /mjuːzɪk/（ミュージック）。「very」の v を唇に注意。" },
    { en: "She goes to school by bus.", ja: "彼女はバスで学校に通っています。", tip: "「goes」は /goʊz/。「school」の sch は /sk/ の音です。" },
    { en: "Do you have a pen?", ja: "ペンを持っていますか？", tip: "「have a」はつなげて /hæv ə/ と。最後の e は発音しません。" },
    { en: "It\'s a beautiful day today.", ja: "今日はとてもいい天気ですね。", tip: "「beautiful」は3音節（ビュー・ティ・フル）。「day today」のリズムを楽しんで。" },
    { en: "I\'m a little tired.", ja: "少し疲れています。", tip: "「little」の t は軽くはじく音。「tired」は /taɪərd/ の2音節で。" },
    { en: "Can I help you?", ja: "何かお手伝いできますか？", tip: "「Can I」はつなげて /kænaɪ/ と。お店でよく聞くフレーズです。" },
    { en: "Let\'s go to lunch together.", ja: "一緒にランチに行きましょう。", tip: "「together」の th は舌を前歯に軽く当てて。「lunch」の u は /ʌ/（ア）。" },
    { en: "I study English every day.", ja: "私は毎日英語を勉強しています。", tip: "「study」の u は /ʌ/（スタディ）。リズムよく読みましょう。" },
    { en: "Turn left at the corner.", ja: "角を左に曲がってください。", tip: "「turn」は /tɜːrn/ と r を響かせて。「corner」も同様に -er を発音します。" },
    { en: "See you tomorrow!", ja: "また明日！", tip: "「tomorrow」は3音節（トゥ・モ・ロウ）。明るく元気よく読んでみましょう！" },
    { en: "Nice to meet you!", ja: "はじめまして！", tip: "「nice to meet you」は会ったときの定番表現。you の前の t を軽くはじいて。" },
    { en: "How was your day?", ja: "今日はどうでしたか？", tip: "挨拶として自然に使えます。語尾を上げ気味に読みましょう。" },
    { en: "I\'m looking forward to the weekend.", ja: "週末が楽しみです。", tip: "「look forward to ～」は「～を楽しみにする」。to の後は名詞か動名詞。" },
    { en: "Could you say that again, please?", ja: "もう一度おっしゃっていただけますか？", tip: "丁寧なお願い。「Could you」のリズムを掴みましょう。" },
    { en: "I usually take a walk after dinner.", ja: "私は夕食後によく散歩します。", tip: "「take a walk」でひとまとまり。「usually」は副詞の位置に注意。" },
    { en: "The meeting starts at nine o\'clock.", ja: "会議は9時に始まります。", tip: "「o\'clock」は時間に使う表現。/əˈklɒk/ と発音します。" },
    { en: "I\'d like a cup of green tea, please.", ja: "緑茶を一杯お願いします。", tip: "「I\'d like」は「I would like」の短縮。丁寧な注文表現です。" },
    { en: "It\'s getting cold these days.", ja: "最近寒くなってきましたね。", tip: "「getting + 形容詞」で「だんだん〜になる」という変化を表します。" },
    { en: "He works at a hospital.", ja: "彼は病院で働いています。", tip: "「work at ～」で「〜で働く」。「work for」は会社名に使います。" },
    { en: "Is there a convenience store nearby?", ja: "近くにコンビニはありますか？", tip: "「Is there ～?」で「〜はありますか？」という質問表現。" },
    { en: "I forgot to bring my umbrella.", ja: "傘を持ってくるのを忘れました。", tip: "「forget to ～」で「〜するのを忘れる」。「forgot」は forget の過去形。" },
    { en: "She has been learning English for two years.", ja: "彼女は2年間英語を学んでいます。", tip: "現在完了進行形。「for + 期間」で継続を表します。" },
    { en: "Could I take a day off tomorrow?", ja: "明日お休みをいただいてもよいですか？", tip: "「take a day off」で「休日を取る」。丁寧な依頼の形です。" },
    { en: "The train was crowded this morning.", ja: "今朝の電車は混んでいました。", tip: "「crowded」は「混雑している」。「packed」も同じ意味で使えます。" },
    { en: "Have a great weekend!", ja: "素敵な週末を！", tip: "別れ際の定番フレーズ。「great」を元気よく読みましょう！" },
    { en: "I was wondering if you could help me with this.", ja: "これについて助けていただけないかと思っていたのですが。", tip: "「wondering」は3音節。全体的にゆったり、柔らかいトーンで読みましょう。" },
    { en: "It\'s been a while since we last caught up.", ja: "最後に話してからしばらく経ちましたね。", tip: "「caught up」の t はほぼ省略。「a while」「caught up」を自然につなぎましょう。" },
    { en: "Could you walk me through the process again?", ja: "もう一度そのプロセスを説明してもらえますか？", tip: "「walk me through」でリンキング。th は舌を前歯に軽く当てて。" },
    { en: "I really appreciate everything you\'ve done for me.", ja: "あなたがしてくれたことすべてに、本当に感謝しています。", tip: "「appreciate」は5音節（ア・プリー・シ・エイ・ト）。感謝の気持ちを込めて。" },
    { en: "Let me know if there\'s anything I can do to help.", ja: "何か力になれることがあれば教えてください。", tip: "「let me know」でリンキング。自然な流れで一息に読んでみましょう。" },
    { en: "I\'m not sure I follow — could you elaborate a bit?", ja: "少し理解できていないのですが、もう少し詳しく説明してもらえますか？", tip: "「elaborate」は4音節（イ・ラ・ボ・レイト）。ダッシュの前に少しポーズ。" },
    { en: "That sounds like a great idea, actually.", ja: "実は、それはとてもいいアイデアだと思います。", tip: "「actually」はコンマの後に置くことで「実は」のニュアンスが出ます。" },
    { en: "We need to be on the same page before we move forward.", ja: "前に進む前に、認識をそろえておく必要があります。", tip: "「on the same page」はイディオム。「move forward」を強調して読みましょう。" },
    { en: "Would it be possible to reschedule our meeting?", ja: "打ち合わせの日程を変更することは可能でしょうか？", tip: "「reschedule」は /riːˈʃedjuːl/（リ・スケ・ジュール）。丁寧なトーンで。" },
    { en: "I\'ve been meaning to get back to you sooner.", ja: "もっと早くご連絡しようと思っていたのですが。", tip: "「meaning to」はつなげて。現在完了進行形のリズムを意識しましょう。" },
    { en: "To be honest, I wasn\'t expecting that outcome.", ja: "正直なところ、そういう結果になるとは思っていませんでした。", tip: "「honest」の h は発音しない（/ˈɒnɪst/）。文頭フレーズの後に少しポーズ。" },
    { en: "It\'s a bit of a long story, but I\'ll try to keep it brief.", ja: "少し長い話になりますが、手短にまとめるようにします。", tip: "「a bit of a」が自然につながるよう練習。「brief」を少し強調して。" },
    { en: "She tends to overthink things before making a decision.", ja: "彼女は決断する前に物事を考えすぎる傾向があります。", tip: "「overthink」の強勢は前半（O-ver-think）。「tends to」はつなげて読みます。" },
    { en: "I\'d say he\'s more of an introvert than an extrovert.", ja: "彼はどちらかというと内向的だと思います。", tip: "「introvert」/ˈɪntrəvɜːrt/「extrovert」/ˈɛkstrəvɜːrt/。語頭のアクセントに注意。" },
    { en: "We finally wrapped up the project ahead of schedule.", ja: "私たちはついにプロジェクトを予定より早く終わらせました。", tip: "「wrapped up」はフレーズ動詞。「ahead of schedule」を自信をもって読んで。" },
    { en: "I\'m really looking forward to catching up with everyone.", ja: "皆さんと話せるのをとても楽しみにしています。", tip: "「catch up with」は「近況を話し合う」。自然な会話表現です。" },
    { en: "It turns out the project was more complex than we thought.", ja: "そのプロジェクトは思ったより複雑だということがわかりました。", tip: "「It turns out ～」は「〜だとわかった」。よく使う口語表現。" },
    { en: "She has a way of making everyone feel comfortable.", ja: "彼女は誰でもリラックスさせてしまう才能があります。", tip: "「have a way of -ing」で「〜する才能がある」という表現。" },
    { en: "I\'d like to take this opportunity to thank you all.", ja: "この機会に皆さんに感謝を伝えたいと思います。", tip: "「take this opportunity to ～」は丁寧なスピーチでよく使います。" },
    { en: "Could you let me know when you\'re available to meet?", ja: "都合のいい時間を教えていただけますか？", tip: "「let me know」は「教えてください」。ビジネスで便利な表現。" },
    { en: "He tends to leave things to the last minute.", ja: "彼は何でも直前まで後回しにする傾向があります。", tip: "「leave things to the last minute」はギリギリまで先延ばしするイディオム。" },
    { en: "I was completely caught off guard by that news.", ja: "そのニュースには完全に不意をつかれました。", tip: "「caught off guard」は「不意をつかれた」という慣用句。" },
    { en: "We\'ve made a lot of progress, but there\'s still room for improvement.", ja: "大きく進歩しましたが、まだ改善の余地があります。", tip: "「room for improvement」は「改善の余地」。ビジネスでよく使う表現。" },
    { en: "I can\'t believe how quickly the year has gone by.", ja: "一年がこんなに早く過ぎてしまったとは信じられません。", tip: "「go by」は時間が「過ぎる」という意味。感嘆の気持ちを込めて。" },
    { en: "As far as I know, everything is going according to plan.", ja: "私が知る限り、すべて計画通りに進んでいます。", tip: "「As far as I know」は「私の知る限り」。謙虚な言い方ができます。" },
    { en: "It\'s easier said than done, but we should at least try.", ja: "言うは易く行うは難しですが、少なくとも挑戦すべきです。", tip: "「easier said than done」は有名なことわざ。自然に使えると◎。" },
    { en: "She came across as very professional during the interview.", ja: "彼女は面接でとても専門的な印象を与えました。", tip: "「come across as ～」は「〜という印象を与える」という表現。" },
    { en: "I\'m not in a position to make that decision on my own.", ja: "私一人でその決断を下せる立場にはありません。", tip: "「not in a position to ～」で「〜できる立場にない」という丁寧な断り方。" },
    { en: "We need to think outside the box to solve this problem.", ja: "この問題を解決するには型にはまらない考え方が必要です。", tip: "「think outside the box」は「固定概念に縛られず考える」という慣用句。" },
    { en: "It was a pleasure working with all of you on this project.", ja: "このプロジェクトで皆さんと一緒に仕事ができて光栄でした。", tip: "「It was a pleasure -ing」は丁寧な締めの言葉として使えます。" },
    { en: "Good evening! Are you enjoying the party?", ja: "こんばんは！パーティーを楽しんでいますか？", tip: "「evening」の v は唇を軽く噛んで。「enjoy」の oy はしっかり二重母音で。" },
    { en: "It\'s so good to see you again!", ja: "また会えて嬉しいです！", tip: "「so good to see you」の「good」「see」を明るく強調して読みましょう。" },
    { en: "Please help yourself to some food.", ja: "どうぞお料理を自由に食べてください。", tip: "「help yourself to ～」は「〜を自由にどうぞ」という丁寧な表現。" },
    { en: "I\'ll be right back.", ja: "すぐ戻ります。", tip: "「right」を強調して「すぐに」のニュアンスを出しましょう。" },
    { en: "Excuse me, do you have a moment?", ja: "すみません、少しよろしいですか？", tip: "「Excuse me」は必ずはっきり言いましょう。「a moment」のつながりに注意。" },
    { en: "It was lovely meeting you.", ja: "お会いできて嬉しかったです。", tip: "「lovely」の ly は軽く。会話の締めくくりに使える丁寧な表現です。" },
    { en: "Please give my regards to your family.", ja: "ご家族によろしくお伝えください。", tip: "「regards」の g は濁音。「give regards to ～」でよろしく伝える表現。" },
    { en: "I hope you have a safe trip home.", ja: "気をつけて帰ってくださいね。", tip: "「safe trip」は別れの挨拶として自然。「journey」でも同じ意味です。" },
    { en: "Let me introduce myself.", ja: "自己紹介させてください。", tip: "「introduce」は4音節（イン・トロ・デュース）。はっきり読みましょう。" },
    { en: "What do you do for fun?", ja: "趣味は何ですか？", tip: "「for fun」で「楽しみのために」。「What are your hobbies?」より口語的。" },
    { en: "I\'m sorry to keep you waiting.", ja: "お待たせしました。", tip: "「keep you waiting」はリンキングしてなめらかに。謝罪の気持ちを込めて。" },
    { en: "After you, please.", ja: "どうぞ、お先に。", tip: "短いが丁寧な表現。「after you」の you を少し上げ気味に。" },
    { en: "Don\'t mention it.", ja: "どういたしまして。", tip: "「You\'re welcome」の口語表現。ナチュラルに、さらっと言いましょう。" },
    { en: "Please feel free to ask me anything.", ja: "何でも気軽に聞いてください。", tip: "「feel free to ～」は「自由に〜してください」。温かいトーンで読みましょう。" },
    { en: "I\'m glad you could make it.", ja: "来てくれてよかったです。", tip: "「make it」は「（その場に）来られる」という意味。" },
    { en: "We should do this again sometime.", ja: "またいつかやりましょうね。", tip: "「sometime」で「いつか」という表現。別れ際によく使います。" },
    { en: "It\'s been such a long time!", ja: "本当に久しぶりですね！", tip: "「such a long time」で「こんなに長い間」という驚きのニュアンス。" },
    { en: "How have you been keeping?", ja: "最近いかがですか？", tip: "「How have you been?」の丁寧版。「keeping」が独特の表現。" },
    { en: "I can\'t thank you enough.", ja: "本当にありがとうございます（どれだけ感謝しても足りません）。", tip: "「can\'t ～ enough」で「いくら〜しても足りない」という感謝の強調。" },
    { en: "That\'s very kind of you.", ja: "ご親切にありがとうございます。", tip: "「That\'s very kind of you」は感謝と褒め言葉を兼ねた表現。" },
    { en: "I need to do the laundry today.", ja: "今日は洗濯をしなければなりません。", tip: "「do the laundry」で洗濯をする。「laundry」の au は /ɔː/ の音。" },
    { en: "Could you turn down the volume, please?", ja: "音量を下げてもらえますか？", tip: "「turn down」は「下げる」。音量・温度・依頼などに使います。" },
    { en: "I overslept this morning.", ja: "今朝は寝坊しました。", tip: "「oversleep」の過去形は「overslept」。「slept in」とも言います。" },
    { en: "Let me check my schedule.", ja: "スケジュールを確認させてください。", tip: "「let me check」は日常でよく使う表現。さらっと自然に言いましょう。" },
    { en: "I\'ll pick you up at seven.", ja: "7時に迎えに行きます。", tip: "「pick up」は「迎えに行く・来る」。「drop off」は「送り届ける」。" },
    { en: "Don\'t forget to lock the door.", ja: "ドアに鍵をかけるのを忘れないでね。", tip: "「don\'t forget to ～」で「〜するのを忘れないで」という注意の表現。" },
    { en: "I\'m running a bit late.", ja: "少し遅れています。", tip: "「running late」は「遅れている」。「a bit」で少しだけのニュアンス。" },
    { en: "Could you save me a seat?", ja: "席をとっておいてもらえますか？", tip: "「save a seat」で「席を確保しておく」。コンサートや映画でよく使います。" },
    { en: "I\'m on my way.", ja: "今向かっています。", tip: "「on my way」で「向かっている途中」。短いが非常によく使う表現。" },
    { en: "Let\'s split the bill.", ja: "割り勘にしましょう。", tip: "「split the bill」で「割り勘」。「go Dutch」も同じ意味のイディオム。" },
    { en: "Can I borrow your charger?", ja: "充電器を貸してもらえますか？", tip: "「borrow」は「借りる」、「lend」は「貸す」。混乱しやすいので注意。" },
    { en: "I need to stop by the grocery store.", ja: "スーパーに寄っていく必要があります。", tip: "「stop by」で「ちょっと立ち寄る」。「grocery store」は食料品店。" },
    { en: "The weather forecast says it\'ll rain tomorrow.", ja: "天気予報では明日は雨だと言っています。", tip: "「weather forecast」の forecast は /ˈfoʊrkæst/。予報の話でよく使います。" },
    { en: "I can\'t find my keys anywhere.", ja: "どこを探しても鍵が見つかりません。", tip: "「anywhere」は否定文で「どこにも」。「somewhere」と区別しましょう。" },
    { en: "Would you mind closing the window?", ja: "窓を閉めていただけますか？", tip: "「Would you mind -ing?」は丁寧な依頼。「mind」は「気にする」の意。" },
    { en: "I have a lot on my plate right now.", ja: "今は抱えていることがたくさんあります。", tip: "「have a lot on my plate」は「多くのことを抱えている」というイディオム。" },
    { en: "I\'m not feeling well today.", ja: "今日は体調がよくありません。", tip: "「not feeling well」は体調不良の定番表現。「under the weather」も同義。" },
    { en: "Let\'s grab a coffee sometime.", ja: "いつかコーヒーでもしましょう。", tip: "「grab a coffee」は口語的。「grab」は食事や飲み物を「さっと取る」感覚。" },
    { en: "I\'ve been meaning to call you.", ja: "ずっと電話しようと思っていたんです。", tip: "「have been meaning to ～」で「ずっと〜しようと思っていた」という表現。" },
    { en: "Could you give me a hand with this?", ja: "これを手伝ってもらえますか？", tip: "「give a hand」は「手を貸す・手伝う」というイディオム。" },
    { en: "Could I see the menu, please?", ja: "メニューを見せていただけますか？", tip: "「Could I see ～?」は「〜を見せてもらえますか？」という丁寧な表現。" },
    { en: "I\'ll have the pasta, please.", ja: "パスタをいただきます。", tip: "「I\'ll have ～」は注文時の自然な表現。「I want」より丁寧に聞こえます。" },
    { en: "Is this dish spicy?", ja: "この料理は辛いですか？", tip: "「spicy」は辛みのある料理。「hot」だと温度が高いという意味になることも。" },
    { en: "Could I get this to go?", ja: "持ち帰りにできますか？", tip: "「to go」はアメリカ英語で持ち帰り。「takeaway」はイギリス英語。" },
    { en: "I\'m allergic to peanuts.", ja: "ピーナッツアレルギーがあります。", tip: "「be allergic to ～」でアレルギーを伝える重要表現。はっきり言いましょう。" },
    { en: "The food here is incredible.", ja: "ここの料理は最高です。", tip: "「incredible」は「信じられないほど素晴らしい」という強調表現。" },
    { en: "Could we get the bill, please?", ja: "お会計をお願いします。", tip: "「get the bill」でお会計を求める表現。「check, please」もよく使います。" },
    { en: "This is my treat.", ja: "私のおごりです。", tip: "「my treat」で「私が払います」。「It\'s on me」も同じ意味。" },
    { en: "What do you recommend?", ja: "何がおすすめですか？", tip: "「recommend」の cc は /k/ の音。飲食店で役立つ定番フレーズ。" },
    { en: "I\'m a vegetarian.", ja: "私はベジタリアンです。", tip: "「vegetarian」は5音節（ベジ・タ・リ・ア・ン）。食の制限を伝える重要表現。" },
    { en: "Can I have some more water?", ja: "水のおかわりをいただけますか？", tip: "「some more ～」で「もう少し〜」。レストランでよく使う表現。" },
    { en: "This is absolutely delicious!", ja: "これは本当においしいです！", tip: "「absolutely」で「まったく、完全に」という強調。感動を伝えるのに最適。" },
    { en: "I\'d like a table for two, please.", ja: "2人用のテーブルをお願いします。", tip: "予約や入店時の表現。「table for ～」の数字をはっきり言いましょう。" },
    { en: "Could we sit outside?", ja: "外に座ってもいいですか？", tip: "「sit outside」で屋外のテーブル席を希望する表現。" },
    { en: "I have a reservation under Smith.", ja: "スミスという名前で予約しています。", tip: "「under + 名前」で予約名を確認する表現。「reservation」の z 音に注意。" },
    { en: "That was a wonderful meal.", ja: "素晴らしいお食事でした。", tip: "食後の感想。「wonderful」の w は唇を丸めて。" },
    { en: "Do you have any daily specials?", ja: "本日のおすすめはありますか？", tip: "「daily specials」は「本日のスペシャルメニュー」。飲食店でよく聞きます。" },
    { en: "Could you make it less salty?", ja: "塩分を控えめにしてもらえますか？", tip: "「make it less ～」で「〜を少なくする」という調理への依頼表現。" },
    { en: "Everything was perfect, thank you.", ja: "すべて完璧でした、ありがとうございます。", tip: "食事の締めくくりに使える感謝の言葉。「perfect」をしっかり発音して。" },
    { en: "I\'d love to try their signature dish.", ja: "あそこの看板メニューを試してみたいです。", tip: "「signature dish」は「看板料理」。「I\'d love to」は強い希望を表します。" },
    { en: "Do you have this in a different color?", ja: "これの別のカラーはありますか？", tip: "「in a different color」で色違いを尋ねる。「in blue」など色を指定することも。" },
    { en: "How much is the shipping fee?", ja: "送料はいくらですか？", tip: "「shipping fee」で配送料。「delivery charge」も同じ意味で使えます。" },
    { en: "I\'m just browsing, thank you.", ja: "見ているだけです、ありがとうございます。", tip: "「just browsing」は「ただ見ているだけ」。お店でよく使う表現。" },
    { en: "Can I try this on?", ja: "試着してもいいですか？", tip: "「try on」は衣類を「試着する」。「Can I try it on?」と一緒に覚えましょう。" },
    { en: "Do you offer a discount?", ja: "割引はありますか？", tip: "「offer a discount」で「割引を提供する」。「Any discount available?」でも同じ。" },
    { en: "Could I have a gift receipt?", ja: "ギフト用のレシートをもらえますか？", tip: "「gift receipt」はプレゼント用レシート。返品交換のために必要な場合があります。" },
    { en: "This is a bit too tight for me.", ja: "これは少しきつすぎます。", tip: "「a bit too tight」で「少しきつすぎる」。サイズの問題を伝える表現。" },
    { en: "I\'ll take it.", ja: "これにします。", tip: "購入を決めた時の短い表現。「I\'ll buy this」より自然で口語的。" },
    { en: "Can I pay by credit card?", ja: "クレジットカードで払えますか？", tip: "「pay by credit card」で支払い方法を確認。「by cash」は現金払い。" },
    { en: "Could I exchange this for a larger size?", ja: "これを大きいサイズと交換してもらえますか？", tip: "「exchange ～ for ～」で「〜を〜と交換する」。返品・交換の定番表現。" },
    { en: "Do you have a loyalty card?", ja: "ポイントカードはありますか？", tip: "「loyalty card」はポイントカード。「Do you have a point card?」でも通じます。" },
    { en: "Is this on sale?", ja: "これはセール品ですか？", tip: "「on sale」で「セール中」。「for sale」は「販売中」という別の意味なので注意。" },
    { en: "The stitching came undone.", ja: "縫い目がほつれてしまいました。", tip: "「stitching」は縫い目。「came undone」でほつれた状態を表します。" },
    { en: "I\'d like to return this item.", ja: "この商品を返品したいのですが。", tip: "「return」を動詞として使う返品の表現。レシートと一緒に言いましょう。" },
    { en: "Where are the fitting rooms?", ja: "試着室はどこですか？", tip: "「fitting rooms」が試着室の一般的な表現。「changing rooms」とも言います。" },
    { en: "Do you have this in stock?", ja: "これは在庫はありますか？", tip: "「in stock」で「在庫あり」。「out of stock」で「在庫切れ」。" },
    { en: "Could I see that one in the window?", ja: "ショーウィンドウのあれを見せてもらえますか？", tip: "「the one in the window」でショーウィンドウの商品を指す表現。" },
    { en: "Is there a warranty on this?", ja: "これには保証がついていますか？", tip: "「warranty」は製品保証。「guarantee」も同様の意味です。" },
    { en: "What\'s your return policy?", ja: "返品ポリシーはどうなっていますか？", tip: "「return policy」で返品規定。「What are your return conditions?」でも OK。" },
    { en: "I\'ll come back later.", ja: "また後で来ます。", tip: "買わずに帰る時の表現。「I\'ll think about it」と合わせて使えます。" },
    { en: "This is exactly what I was looking for.", ja: "これはまさに探していたものです。", tip: "「exactly what I was looking for」で「探していたものにぴったり」という喜びの表現。" },
    { en: "Can I have it wrapped as a gift?", ja: "プレゼント包装してもらえますか？", tip: "「wrapped as a gift」でギフトラッピングをお願いする表現。" },
    { en: "I\'ll take two, please.", ja: "2つください。", tip: "数量を指定して注文する表現。「please」を添えると丁寧になります。" },
    { en: "Do you ship internationally?", ja: "海外配送はしていますか？", tip: "「ship internationally」で国際配送の確認。「worldwide shipping」とも言います。" },
    { en: "Is there a fee for alterations?", ja: "お直しには費用がかかりますか？", tip: "「alterations」は衣類の「お直し」。「Is it complimentary?」でも無料か確認できます。" },
    { en: "Which platform does the train leave from?", ja: "電車は何番ホームから出ますか？", tip: "「platform」はホーム・プラットフォーム。「Which track?」でも同じ意味です。" },
    { en: "Does this bus go to the city center?", ja: "このバスは市内中心部に行きますか？", tip: "「city center」はイギリス英語。アメリカでは「downtown」がよく使われます。" },
    { en: "How long is the flight?", ja: "フライト時間はどれくらいですか？", tip: "「flight time」「duration」でも確認できます。「about ～ hours」で答えましょう。" },
    { en: "I\'d like a window seat, please.", ja: "窓側の席をお願いします。", tip: "「window seat」窓側、「aisle seat」通路側。飛行機・電車でよく使います。" },
    { en: "Can I upgrade to business class?", ja: "ビジネスクラスにアップグレードできますか？", tip: "「upgrade to ～」でクラスのアップグレードを希望する表現。" },
    { en: "My luggage is overweight.", ja: "荷物が重量超過しています。", tip: "「overweight」は体重超過とも使う語。「excess baggage fee」は超過料金。" },
    { en: "Where can I find the lost and found?", ja: "遺失物取扱所はどこですか？", tip: "「lost and found」は遺失物取扱所。「lost property office」とも言います。" },
    { en: "Is there a direct train to the airport?", ja: "空港への直通電車はありますか？", tip: "「direct train」は直通電車。「transfer」は乗り換えを意味します。" },
    { en: "I\'d like to check in, please.", ja: "チェックインをお願いします。", tip: "ホテル・航空のチェックイン表現。「checking out」はチェックアウト。" },
    { en: "Could I have a wake-up call at six?", ja: "6時にモーニングコールをお願いします。", tip: "「wake-up call」はモーニングコール。「a call at ～」で時間指定します。" },
    { en: "How far is it from the station?", ja: "駅からどれくらいですか？", tip: "距離を尋ねる基本表現。「within walking distance」なら「徒歩圏内」という答えも。" },
    { en: "Is breakfast included?", ja: "朝食は含まれていますか？", tip: "「included」で「含まれている」。「Is it included in the price?」でも確認できます。" },
    { en: "Could you recommend a good tourist spot?", ja: "おすすめの観光スポットを教えてもらえますか？", tip: "「tourist spot」は観光名所。「local hidden gem」は穴場の表現。" },
    { en: "I\'d like to extend my stay by one night.", ja: "1泊延長したいのですが。", tip: "「extend one\'s stay」で滞在を延長する表現。ホテルでよく使います。" },
    { en: "Is there a tourist information center nearby?", ja: "近くに観光案内所はありますか？", tip: "「tourist information center」は観光案内所。「visitor\'s bureau」とも言います。" },
    { en: "What time does the last train leave?", ja: "終電は何時ですか？", tip: "「last train」は「最終電車」。「first train」は「始発」。大事な表現です。" },
    { en: "Could you show me on the map?", ja: "地図で教えてもらえますか？", tip: "「show me on the map」は地図で場所を示してもらう表現。旅行中に役立ちます。" },
    { en: "I think I\'m lost.", ja: "道に迷ってしまったようです。", tip: "「I\'m lost」は「迷子になった」。「I think」を付けることで柔らかくなります。" },
    { en: "How often does the bus run?", ja: "バスはどれくらいの頻度で来ますか？", tip: "「How often does ～ run?」で交通機関の運行頻度を確認する表現。" },
    { en: "Can I leave my bags here until check-in time?", ja: "チェックインの時間まで荷物をここに置いておけますか？", tip: "「until check-in time」で時間を指定する表現。ホテルでよく使います。" },
    { en: "Is the site accessible by wheelchair?", ja: "その場所は車椅子でアクセスできますか？", tip: "「accessible by wheelchair」でバリアフリー対応を確認する重要表現。" },
    { en: "I need to catch a connecting flight.", ja: "乗り継ぎ便があります。", tip: "「connecting flight」は乗り継ぎ便。「transit」とも言います。" },
    { en: "Do I need a visa for this country?", ja: "この国にはビザが必要ですか？", tip: "「Do I need a visa?」は渡航前に確認すべき重要表現。" },
    { en: "The flight has been delayed by two hours.", ja: "フライトが2時間遅延しています。", tip: "「delayed by ～」で「〜だけ遅れる」。「delayed until ～」は「〜まで遅れる」。" },
    { en: "Could you call a cab for me?", ja: "タクシーを呼んでもらえますか？", tip: "「cab」はアメリカ英語でタクシー。「cab」「taxi」どちらも使えます。" },
    { en: "Where is the nearest subway station?", ja: "最寄りの地下鉄の駅はどこですか？", tip: "「subway」はアメリカ英語。イギリスでは「underground」「tube」と言います。" },
    { en: "I\'d like to rent a car for three days.", ja: "3日間、車を借りたいのですが。", tip: "「rent a car」でレンタカー。「for ～ days」で期間を指定します。" },
    { en: "Is there a shuttle bus to the hotel?", ja: "ホテルへのシャトルバスはありますか？", tip: "「shuttle bus」は定期路線バス。空港・ホテル間でよく使われます。" },
    { en: "My passport expires next month.", ja: "来月パスポートの有効期限が切れます。", tip: "「expire」は「期限が切れる」。「expiration date」で有効期限を確認できます。" },
    { en: "The view from here is breathtaking.", ja: "ここからの眺めは息をのむほどです。", tip: "「breathtaking」は「息をのむほど美しい」。「spectacular」「stunning」も同義。" },
    { en: "I have a job interview tomorrow.", ja: "明日就職の面接があります。", tip: "「job interview」は「就職面接」。「interview」の stress は第2音節。" },
    { en: "Could you send me the report by email?", ja: "レポートをメールで送っていただけますか？", tip: "「by email」で電子メールで送る表現。「via email」でも同じ意味。" },
    { en: "I\'ll forward this to the relevant team.", ja: "関係するチームに転送します。", tip: "「forward」はメールを「転送する」。「relevant」は「関連する」。" },
    { en: "We need to set a deadline for this task.", ja: "このタスクの締め切りを設定する必要があります。", tip: "「set a deadline」で締め切りを設定する。「firm deadline」は厳守の締め切り。" },
    { en: "Could you please proofread this document?", ja: "この書類の校正をお願いできますか？", tip: "「proofread」は「校正する」。「review」「check」より正式な表現です。" },
    { en: "Let\'s schedule a meeting for next week.", ja: "来週のミーティングをスケジュールに入れましょう。", tip: "「schedule a meeting」でミーティングの日程を決める表現。" },
    { en: "I\'m currently working on a tight deadline.", ja: "今、厳しい締め切りに追われています。", tip: "「tight deadline」は「厳しい締め切り」。「under pressure」とも一緒に使います。" },
    { en: "Could you put me through to the manager?", ja: "マネージャーに取り次いでもらえますか？", tip: "「put someone through to ～」は電話で「〜に取り次ぐ」という表現。" },
    { en: "I\'ll need more time to finalize the details.", ja: "詳細を確定するにはもう少し時間が必要です。", tip: "「finalize」は「最終確定する」。「iron out the details」も同様の表現。" },
    { en: "The client was very satisfied with our proposal.", ja: "クライアントは私たちの提案にとても満足していました。", tip: "「satisfied with ～」で「〜に満足している」という表現。" },
    { en: "I\'ll prepare the presentation slides.", ja: "プレゼンのスライドを準備します。", tip: "「prepare」は「準備する」。「presentation slides」はプレゼン資料のスライド。" },
    { en: "Could we move the meeting to Thursday?", ja: "ミーティングを木曜日に移動できますか？", tip: "「move ～ to ～」で「〜を〜に変更する」。日程変更でよく使います。" },
    { en: "Please keep this confidential.", ja: "これは内密にしてください。", tip: "「confidential」は「機密の」。「off the record」も非公式に内密を伝えます。" },
    { en: "I\'ve been working here for five years.", ja: "ここで5年間働いています。", tip: "現在完了形で継続を表す。「for ～ years」で期間を示します。" },
    { en: "The sales figures have improved significantly.", ja: "売上の数字が大幅に改善されました。", tip: "「significantly」は「大幅に」という副詞。「considerably」「remarkably」も同義。" },
    { en: "I\'ll be out of the office on Friday.", ja: "金曜日は不在にしています。", tip: "「out of the office」で「外出・不在」。メール自動応答でもよく使います。" },
    { en: "Could you cc me on that email?", ja: "そのメールをccに入れてもらえますか？", tip: "「cc me on ～」でCCに追加する表現。ビジネスメールの基本フレーズ。" },
    { en: "I\'ll loop in the project manager.", ja: "プロジェクトマネージャーも連絡の輪に入れます。", tip: "「loop someone in」で「〜を情報共有の輪に加える」というビジネス表現。" },
    { en: "We\'re behind on the project.", ja: "プロジェクトが遅れています。", tip: "「behind on ～」で「〜が遅れている」。「ahead of schedule」は逆に進んでいること。" },
    { en: "Let\'s take this offline.", ja: "この話は別途話し合いましょう。", tip: "「take this offline」は「別途1対1で話す」。会議でよく使うビジネス表現。" },
    { en: "I\'d like to make an appointment with the doctor.", ja: "医師の診察予約をしたいのですが。", tip: "「make an appointment」で予約を取る表現。病院・美容院などで使います。" },
    { en: "I\'ve been having trouble sleeping lately.", ja: "最近、睡眠に問題があります。", tip: "「have trouble -ing」で「〜に苦労している」。「insomnia」は不眠症。" },
    { en: "I have a sore throat.", ja: "喉が痛いです。", tip: "「sore throat」は「喉の痛み」。「sore」は「痛い、ひりひりする」という形容詞。" },
    { en: "Could I get a prescription?", ja: "処方箋をもらえますか？", tip: "「prescription」は「処方箋」。「prescribed medication」は処方薬。" },
    { en: "I\'m feeling lightheaded.", ja: "頭がくらくらします。", tip: "「lightheaded」は「めまいがする、ふらふらする」という表現。" },
    { en: "How often should I take this medicine?", ja: "この薬はどれくらいの頻度で飲めばいいですか？", tip: "「How often」で頻度を確認。「twice a day」は「1日2回」という答え方。" },
    { en: "My back has been hurting since last week.", ja: "先週から腰が痛いです。", tip: "「have been -ing」の現在完了進行形で継続する症状を表します。" },
    { en: "Is this covered by my insurance?", ja: "これは保険で対応されますか？", tip: "「covered by insurance」で「保険が適用される」。" },
    { en: "I\'d like to get a full checkup.", ja: "健康診断を受けたいのですが。", tip: "「full checkup」は「総合健診」。「complete physical」とも言います。" },
    { en: "I\'ve been trying to cut back on sugar.", ja: "砂糖を控えるようにしています。", tip: "「cut back on ～」で「〜を減らす」。食習慣の改善でよく使う表現。" },
    { en: "I\'m feeling much better now, thank you.", ja: "だいぶよくなりました、ありがとうございます。", tip: "「feeling much better」は回復を伝える表現。「much」で変化の大きさを強調。" },
    { en: "Could I have the emergency number?", ja: "緊急連絡先を教えてもらえますか？", tip: "「emergency number」は緊急連絡先。海外では必ず確認しましょう。" },
    { en: "I think I\'m coming down with a cold.", ja: "風邪をひきそうな感じがします。", tip: "「come down with ～」で「〜にかかりそう」。初期症状の時に使います。" },
    { en: "Should I take any precautions?", ja: "何か予防策をとった方がいいですか？", tip: "「take precautions」で「予防措置をとる」という表現。" },
    { en: "I\'d like to get a second opinion.", ja: "セカンドオピニオンを聞きたいのですが。", tip: "「second opinion」は他の医師の意見。医療だけでなく仕事でも使えます。" },
    { en: "It looks like it\'s going to snow.", ja: "雪が降りそうですね。", tip: "「it looks like ～」で「〜のようだ」という推測表現。" },
    { en: "The humidity is really high today.", ja: "今日は湿気がとても高いですね。", tip: "「humidity」は「湿度、湿気」。日本の梅雨の話でよく使います。" },
    { en: "I love this crisp autumn air.", ja: "このさわやかな秋の空気が好きです。", tip: "「crisp」は「引き締まるような、さわやかな」。秋の空気を表す形容詞。" },
    { en: "There\'s going to be a typhoon this weekend.", ja: "今週末は台風が来そうです。", tip: "「There\'s going to be ～」で気象情報を伝える表現。" },
    { en: "It cleared up nicely after the rain.", ja: "雨の後はすっきりと晴れました。", tip: "「clear up」で「晴れ上がる」。「after the rain」でつながりよく読みましょう。" },
    { en: "Dress warmly — it\'s freezing outside.", ja: "暖かくしてね、外はとても寒いですよ。", tip: "「dress warmly」は「厚着をする」。「freezing」は「凍るほど寒い」の誇張表現。" },
    { en: "There\'s a thunderstorm forecast for tonight.", ja: "今夜は雷雨の予報が出ています。", tip: "「thunderstorm」は「雷雨」。「thunder」雷、「lightning」稲妻を区別しましょう。" },
    { en: "The cherry blossoms are in full bloom.", ja: "桜が満開です。", tip: "「in full bloom」で「満開の」という表現。日本の春の話でよく使います。" },
    { en: "What a gorgeous sunset!", ja: "なんて素晴らしい夕日でしょう！", tip: "「gorgeous」は「素晴らしい、見事な」。「beautiful」より強い表現です。" },
    { en: "It\'s unusually warm for this time of year.", ja: "この時期にしては異常に暖かいですね。", tip: "「unusually warm」で「異常に暖かい」。気候変動の話でも使えます。" },
    { en: "We\'re under a heat advisory today.", ja: "今日は熱中症警戒アラートが出ています。", tip: "「heat advisory」は熱中症警戒情報。「advisory」は「勧告、警報」。" },
    { en: "The fog is really thick this morning.", ja: "今朝は霧がとても濃いです。", tip: "「thick fog」で「濃霧」。「foggy」は霧がかかった様子を表す形容詞。" },
    { en: "Spring is just around the corner.", ja: "もうすぐ春ですね。", tip: "「just around the corner」は「もうすぐ、間近に」というイディオム。" },
    { en: "It\'s been raining cats and dogs all day.", ja: "一日中土砂降りです。", tip: "「raining cats and dogs」は「土砂降り」という有名なイディオム。" },
    { en: "I hope the weather holds up for the weekend.", ja: "週末は天気がもつといいですね。", tip: "「hold up」で天気が「もつ、保つ」という表現。" },
    { en: "I couldn\'t agree more.", ja: "まったく同感です。", tip: "「I couldn\'t agree more」は「これ以上同意できない=完全に賛成」という強調表現。" },
    { en: "That\'s not quite what I meant.", ja: "それは私が言いたかったこととは少し違います。", tip: "「not quite what I meant」で「意図した内容と少し違う」という丁寧な訂正。" },
    { en: "I can see where you\'re coming from.", ja: "あなたの言いたいことはわかります。", tip: "「see where someone is coming from」で「立場・意図が理解できる」という共感表現。" },
    { en: "I have mixed feelings about this.", ja: "これについては複雑な気持ちです。", tip: "「have mixed feelings」で「複雑な感情を持っている」という表現。" },
    { en: "That\'s a fair point.", ja: "それはおっしゃる通りです。", tip: "「a fair point」で「もっともな指摘」。「fair enough」も同様の同意表現。" },
    { en: "I beg to differ.", ja: "少し意見が違います（異議を唱えます）。", tip: "「beg to differ」は「丁寧に異議を唱える」。フォーマルな反論表現。" },
    { en: "I\'m on the fence about this issue.", ja: "この問題については判断がつきません。", tip: "「on the fence」は「どちらとも決めかねている」というイディオム。" },
    { en: "That really puts things into perspective.", ja: "それは物事を客観的に見る助けになりますね。", tip: "「puts things into perspective」で「物事を正しい視点で捉えられる」という表現。" },
    { en: "I think we\'ll have to agree to disagree.", ja: "お互いに意見が違うということで合意しましょう。", tip: "「agree to disagree」は「意見の相違を認め合う」というイディオム。" },
    { en: "I\'m not convinced yet.", ja: "まだ納得していません。", tip: "「not convinced」は「説得されていない、納得していない」という表現。" },
    { en: "That\'s food for thought.", ja: "それは考えさせられますね。", tip: "「food for thought」は「考えるヒント・材料」というイディオム。" },
    { en: "I\'m all for it.", ja: "大賛成です。", tip: "「I\'m all for ～」は「〜に大賛成」という口語表現。「100% support」のニュアンス。" },
    { en: "I can\'t help feeling a bit uneasy.", ja: "少し不安を感じずにはいられません。", tip: "「can\'t help -ing」で「〜せずにはいられない」という表現。" },
    { en: "Looking back, I think I made the right choice.", ja: "振り返ってみると、正しい選択をしたと思います。", tip: "「looking back」で「振り返ってみると」。過去の行動を振り返る表現。" },
    { en: "It\'s hard to put into words.", ja: "言葉で表すのが難しいです。", tip: "「put into words」で「言葉で表現する」。感情を伝えにくい時に使います。" },
    { en: "That really means a lot to me.", ja: "それは本当に嬉しいです（大きな意味があります）。", tip: "「means a lot to me」で「自分にとってとても大切・嬉しい」という感謝の表現。" },
    { en: "I\'ve had a change of heart.", ja: "気が変わりました。", tip: "「a change of heart」は「気持ちの変化」というイディオム。" },
    { en: "I feel like we\'re finally getting somewhere.", ja: "ようやく前進できている気がします。", tip: "「getting somewhere」で「前進している、進歩している」という口語表現。" },
    { en: "I have a gut feeling something is off.", ja: "何かおかしいという直感があります。", tip: "「gut feeling」は「直感」。「gut instinct」とも言います。" },
    { en: "I\'m genuinely excited about this.", ja: "これを本当に楽しみにしています。", tip: "「genuinely」は「心から、本当に」という副詞。感情の真剣さを伝えます。" },
    { en: "The situation calls for a fresh approach.", ja: "この状況には新しいアプローチが必要です。", tip: "「calls for」は「〜を必要とする、求める」という表現。" },
    { en: "We need to address the elephant in the room.", ja: "避けて通れない問題について話し合う必要があります。", tip: "「elephant in the room」は「みんなが避けている明らかな問題」というイディオム。" },
    { en: "She wears her heart on her sleeve.", ja: "彼女は感情を顔に出すタイプです。", tip: "「wear one\'s heart on one\'s sleeve」は「感情をストレートに表す」というイディオム。" },
    { en: "We\'re in the same boat here.", ja: "私たちは同じ状況にいます。", tip: "「in the same boat」は「同じ状況・立場にいる」というイディオム。" },
    { en: "Let\'s not beat around the bush.", ja: "遠回しにしないでいきましょう。", tip: "「beat around the bush」は「遠回しに言う、本題を避ける」というイディオム。" },
    { en: "I think we need to read between the lines here.", ja: "ここでは行間を読む必要があると思います。", tip: "「read between the lines」は「行間を読む、真意を汲む」というイディオム。" },
    { en: "The ball is in your court now.", ja: "あとはあなた次第です。", tip: "「the ball is in your court」は「あとはあなた次第」というスポーツ由来のイディオム。" },
    { en: "Let\'s cut to the chase.", ja: "本題に入りましょう。", tip: "「cut to the chase」は「本題に入る、無駄を省く」というイディオム。" },
    { en: "She hit the ground running.", ja: "彼女はすぐに全力で取りかかりました。", tip: "「hit the ground running」は「出だしから全力で取り組む」という表現。" },
    { en: "We\'ll need to think on our feet.", ja: "臨機応変に対応する必要があります。", tip: "「think on one\'s feet」は「素早く判断する、臨機応変に考える」という表現。" },
    { en: "I\'m going to have to put my foot down on this.", ja: "この件については妥協できません。", tip: "「put one\'s foot down」は「断固として譲らない」というイディオム。" },
    { en: "Let\'s see if we can meet in the middle.", ja: "お互い歩み寄れるか見てみましょう。", tip: "「meet in the middle」は「中間点で妥協する、歩み寄る」という表現。" },
    { en: "That\'s a double-edged sword.", ja: "それは諸刃の剣ですね。", tip: "「double-edged sword」は「諸刃の剣、良い面も悪い面もある」というイディオム。" },
    { en: "We\'re burning bridges here.", ja: "私たちは後退できない状況を作っています。", tip: "「burn bridges」は「後退できない橋を焼く、関係を壊す」という表現。" },
    { en: "I didn\'t mean to step on any toes.", ja: "誰かの気分を害するつもりはありませんでした。", tip: "「step on someone\'s toes」は「踏み込む、気分を害する」というイディオム。" },
    { en: "The project is in its final stretch.", ja: "プロジェクトは最終段階に入っています。", tip: "「final stretch」は「最後の追い込み、最終局面」というスポーツ由来の表現。" },
    { en: "I want to make absolutely sure we\'re aligned.", ja: "私たちの認識が一致していることを確実に確かめたいです。", tip: "「aligned」は「方向性・認識が一致している」。ビジネスでよく使います。" },
    { en: "Could you give me the benefit of the doubt?", ja: "私の言葉を信じてもらえますか？", tip: "「give the benefit of the doubt」は「疑わしくても信じる」というイディオム。" },
    { en: "I think we need to brace ourselves for this.", ja: "これには覚悟が必要だと思います。", tip: "「brace oneself for ～」で「〜に備えて覚悟する」という表現。" },
    { en: "Let\'s not lose sight of the bigger picture.", ja: "大局を見失わないようにしましょう。", tip: "「lose sight of ～」で「〜を見失う」。「bigger picture」は「全体像」。" },
    { en: "I think there\'s more to this than meets the eye.", ja: "これは見た目以上に複雑なことがあると思います。", tip: "「more than meets the eye」は「見た目より複雑、外見通りでない」というイディオム。" },
    { en: "She rose to the occasion beautifully.", ja: "彼女は見事にその場に応じた行動を取りました。", tip: "「rise to the occasion」は「場に応じて力を発揮する、奮い立つ」という表現。" },
    { en: "I think it\'s time to take stock of where we are.", ja: "今どの状況にいるかを改めて評価する時だと思います。", tip: "「take stock of ～」は「〜を評価・把握する」というビジネス表現。" },
    { en: "We\'ve been going back and forth on this.", ja: "この件では何度もやり取りを繰り返しています。", tip: "「go back and forth」は「行ったり来たり、堂々巡りをする」という表現。" },
    { en: "I think we should approach this more holistically.", ja: "もっと全体的な視点でこれに取り組むべきだと思います。", tip: "「holistically」は「全体論的に、総合的に」という副詞。" },
    { en: "He managed to turn the situation around.", ja: "彼は状況を好転させることができました。", tip: "「turn the situation around」は「状況を好転させる、逆転する」という表現。" },
    { en: "I think this is a defining moment for us.", ja: "これは私たちにとって重要な岐路だと思います。", tip: "「defining moment」は「決定的な瞬間、岐路」。重要な状況の表現。" },
    { en: "We need to be more proactive about this.", ja: "この件についてはもっと積極的に取り組む必要があります。", tip: "「proactive」は「先を見越して積極的な」。「reactive」（後手に回る）の対義語。" },
    { en: "Let\'s get to the bottom of this issue.", ja: "この問題の根本を明らかにしましょう。", tip: "「get to the bottom of ～」は「〜の真相・根本に迫る」というイディオム。" },
    { en: "I was pleasantly surprised by the outcome.", ja: "結果に嬉しい意味で驚きました。", tip: "「pleasantly surprised」は「良い意味で驚かされた」という表現。" },
    { en: "We can\'t afford to drop the ball on this one.", ja: "この件で失敗するわけにはいきません。", tip: "「drop the ball」は「ミスをする、チャンスを逃す」というイディオム。" },
    { en: "I think we should table this for now.", ja: "これは一旦保留にしましょう。", tip: "「table」は英米で逆の意味に注意。アメリカでは「棚上げ」、英国では「取り上げる」。" },
    { en: "She always goes the extra mile.", ja: "彼女はいつも期待以上の努力をします。", tip: "「go the extra mile」は「一歩余分に努力する、特別な努力をする」というイディオム。" },
    { en: "We\'re all in this together.", ja: "私たちは皆、一緒に取り組んでいます。", tip: "「all in this together」は「一体となって取り組む」という連帯感の表現。" },
    { en: "I think we need to course-correct here.", ja: "ここで軌道修正が必要だと思います。", tip: "「course-correct」は「軌道修正する」というビジネス・航空由来の表現。" },
    { en: "Let\'s build on what we\'ve already achieved.", ja: "すでに達成したことを土台に進めましょう。", tip: "「build on ～」で「〜を土台にする、〜を生かす」という表現。" },
    { en: "I\'d rather tackle this head-on.", ja: "これには正面から取り組みたいと思います。", tip: "「tackle head-on」は「正面から取り組む」という表現。「I\'d rather」は希望を表します。" },
    { en: "She has a knack for breaking things down simply.", ja: "彼女は物事を簡単に分解して説明する才能があります。", tip: "「have a knack for ～」は「〜の才能・コツを持っている」という表現。" },
    { en: "This could be a real game changer for us.", ja: "これは私たちにとって本当に大きな変革になるかもしれません。", tip: "「game changer」は「状況を一変させるもの」。ビジネスでよく使います。" },
    { en: "I think we\'re overcomplicating this.", ja: "これを複雑に考えすぎていると思います。", tip: "「overcomplicating」は「複雑にしすぎる」。「overthinking」とセットで使えます。" },
    { en: "Let\'s take it one step at a time.", ja: "一歩一歩進めていきましょう。", tip: "「one step at a time」は「少しずつ、段階を踏んで」という表現。" },
    { en: "We need to be realistic about our expectations.", ja: "期待については現実的に考える必要があります。", tip: "「be realistic about ～」は「〜について現実的になる」。" },
    { en: "This is just the tip of the iceberg.", ja: "これはほんの一部に過ぎません。", tip: "「tip of the iceberg」は「氷山の一角」という有名なイディオム。" },
    { en: "She has an exceptional eye for detail.", ja: "彼女は細部への洞察力が非常に優れています。", tip: "「an eye for detail」は「細部への注意力・洞察力」という表現。" },
    { en: "Let\'s make sure everyone is on board.", ja: "全員が同意していることを確認しましょう。", tip: "「on board」は「賛成・同意している」というビジネスイディオム。" },
    { en: "My parents have been married for thirty years.", ja: "私の両親は結婚して30年になります。", tip: "「have been married for」は継続の現在完了。「thirty years」は結婚年数。" },
    { en: "She is very close to her grandmother.", ja: "彼女はおばあさんととても仲が良いです。", tip: "「close to」は「〜と親しい・仲が良い」という意味。" },
    { en: "We had a family reunion last summer.", ja: "去年の夏に家族の集まりがありました。", tip: "「family reunion」は親族が集まる行事。「reunion」は再会・同窓会の意味もある。" },
    { en: "He takes after his father in many ways.", ja: "彼は多くの点でお父さんに似ています。", tip: "「take after」は外見や性格が似ている、という熟語。" },
    { en: "My sister and I get along very well.", ja: "私と姉はとても仲が良いです。", tip: "「get along (with)」は「〜と仲良くする・うまくやっていく」という表現。" },
    { en: "They adopted a child from overseas.", ja: "彼らは海外から子どもを養子にしました。", tip: "「adopt」は「養子にする」。「overseas」は「海外に・から」。" },
    { en: "My cousin lives in Osaka.", ja: "私のいとこは大阪に住んでいます。", tip: "「cousin」は「いとこ」。日本語と違い男女を区別しない。" },
    { en: "We celebrate my mother\'s birthday every year.", ja: "毎年、母の誕生日を祝います。", tip: "「celebrate」の l は舌を歯茎につけて。「every year」は習慣を表す。" },
    { en: "He looks up to his older brother.", ja: "彼はお兄さんを尊敬しています。", tip: "「look up to」は「〜を尊敬する」という句動詞。" },
    { en: "My parents always support my decisions.", ja: "両親はいつも私の決断を支持してくれます。", tip: "「support」の ou は短い音。「decisions」は複数形に注意。" },
    { en: "We are expecting our first child.", ja: "私たちは初めての子どもを待ち望んでいます。", tip: "「expecting a child」は「妊娠している・出産を予定している」という表現。" },
    { en: "She raised three children on her own.", ja: "彼女は3人の子どもをひとりで育てました。", tip: "「raise children」は「子どもを育てる」。「on her own」は「一人で」。" },
    { en: "My grandparents live in the countryside.", ja: "祖父母は田舎に住んでいます。", tip: "「countryside」は「田舎・地方」。「in the countryside」と前置詞 in を使う。" },
    { en: "He proposed to her at a restaurant.", ja: "彼はレストランで彼女にプロポーズしました。", tip: "「propose to」は「〜にプロポーズする」。前置詞 to に注意。" },
    { en: "They have been together for five years.", ja: "彼らは5年間付き合っています。", tip: "「have been together」は「付き合っている」状態の継続を表す現在完了。" },
    { en: "Family is the most important thing in my life.", ja: "家族は私の人生で最も大切なものです。", tip: "「most important」は最上級。「in my life」で「私の人生において」。" },
    { en: "My brother is getting married next spring.", ja: "弟は来春結婚します。", tip: "「getting married」の現在進行形で「近い将来の予定」を表す。" },
    { en: "We visit our relatives during the holidays.", ja: "休暇中に親戚を訪問します。", tip: "「relatives」は「親戚」。「holidays」は連休・祝日などを指す。" },
    { en: "She misses her family when she travels.", ja: "旅行中、彼女は家族が恋しくなります。", tip: "「miss」は「〜が恋しい・いなくて寂しい」という感情動詞。" },
    { en: "My uncle taught me how to cook.", ja: "おじが料理の仕方を教えてくれました。", tip: "「teach + 人 + how to」は「〜のやり方を教える」という構文。" },
    { en: "They decided to move in together.", ja: "彼らは一緒に住むことに決めました。", tip: "「move in together」は「一緒に住み始める」という口語的表現。" },
    { en: "My daughter just started kindergarten.", ja: "娘がようやく幼稚園に入りました。", tip: "「kindergarten」はドイツ語由来。「just started」は「ちょうど始めた」。" },
    { en: "We share household chores equally.", ja: "私たちは家事を平等に分担しています。", tip: "「household chores」は「家事」。「equally」は「平等に・均等に」。" },
    { en: "He is the youngest of four siblings.", ja: "彼は4人兄弟の末っ子です。", tip: "「the youngest of」は「〜の中で一番若い」。「siblings」は兄弟姉妹の総称。" },
    { en: "She became a grandmother at age sixty.", ja: "彼女は60歳でおばあさんになりました。", tip: "「at age sixty」は「60歳で」。「become」は変化を表す動詞。" },
    { en: "I updated my smartphone to the latest version.", ja: "スマートフォンを最新バージョンにアップデートしました。", tip: "「update to」は「〜に更新する」。「latest」は「最新の」。" },
    { en: "She works from home using video calls.", ja: "彼女はビデオ通話を使って自宅で仕事をしています。", tip: "「work from home」はリモートワークの定番表現。" },
    { en: "I forgot my password again.", ja: "またパスワードを忘れてしまいました。", tip: "「forgot」は forget の過去形。「again」で「また・再び」。" },
    { en: "The internet connection is very slow today.", ja: "今日はインターネットの接続がとても遅いです。", tip: "「connection」の c と n の間の短い母音に注意。" },
    { en: "He spends too much time on social media.", ja: "彼はソーシャルメディアに時間を使いすぎます。", tip: "「spend time on」は「〜に時間を費やす」。" },
    { en: "The battery died before I finished my work.", ja: "仕事が終わる前にバッテリーが切れました。", tip: "「the battery died」は「バッテリーが切れた」という口語表現。" },
    { en: "She ordered groceries online.", ja: "彼女はオンラインで食料品を注文しました。", tip: "「groceries」は「食料品（複数形）」。online は副詞として使える。" },
    { en: "I backed up my files to the cloud.", ja: "ファイルをクラウドにバックアップしました。", tip: "「back up」は「バックアップする」という句動詞。" },
    { en: "This app makes my life so much easier.", ja: "このアプリのおかげで生活がとても楽になりました。", tip: "「make + 目的語 + 形容詞」の構文。「so much easier」は比較級を強調。" },
    { en: "He learned to code from online tutorials.", ja: "彼はオンラインのチュートリアルでコーディングを学びました。", tip: "「learn to」は「〜できるようになる」。「tutorials」は複数形。" },
    { en: "We use AI tools to improve our productivity.", ja: "私たちは生産性向上のためにAIツールを使います。", tip: "「improve productivity」は「生産性を高める」というビジネス表現。" },
    { en: "The software crashed and I lost all my data.", ja: "ソフトウェアがクラッシュして、データが全部消えました。", tip: "「crashed」は「クラッシュした・落ちた」。「lost all my data」は大変な状況。" },
    { en: "Can you share your screen with me?", ja: "画面を共有してもらえますか？", tip: "「share your screen」はオンライン会議での定番フレーズ。" },
    { en: "I need to charge my phone.", ja: "スマホを充電しないといけません。", tip: "「charge」は「充電する」。「need to」で必要性を表す。" },
    { en: "The new model has a much better camera.", ja: "新しいモデルはカメラがずっと優れています。", tip: "「much better」は比較級を much で強調。" },
    { en: "She set up two-factor authentication.", ja: "彼女は二段階認証を設定しました。", tip: "「set up」は「設定する・セットアップする」という句動詞。" },
    { en: "Technology is changing faster than ever.", ja: "テクノロジーはかつてないほど速く変化しています。", tip: "「faster than ever」は「これまで以上に速く」という比較表現。" },
    { en: "I stream music while I work out.", ja: "運動中に音楽をストリーミングします。", tip: "「stream」は動詞としても使える。「work out」は「運動する」。" },
    { en: "The printer is not responding.", ja: "プリンターが反応しません。", tip: "「not responding」はよく見るエラー表現。「respond」に-ing をつけた形。" },
    { en: "He downloaded a translation app.", ja: "彼は翻訳アプリをダウンロードしました。", tip: "「download」の英語アクセントは「ˈdaʊnloʊd」。" },
    { en: "We held a virtual meeting with our overseas clients.", ja: "海外のクライアントとオンライン会議を行いました。", tip: "「virtual meeting」はオンラインで行う会議。「overseas clients」は海外顧客。" },
    { en: "She always puts her phone on silent at the movies.", ja: "彼女は映画館ではいつもスマホをマナーモードにします。", tip: "「put on silent」は「サイレントモードにする」。" },
    { en: "My laptop needs a new battery.", ja: "ノートパソコンのバッテリーを新しくする必要があります。", tip: "「needs a new battery」は「新しいバッテリーが必要」。" },
    { en: "The website was down for a few hours.", ja: "そのウェブサイトは数時間ダウンしていました。", tip: "「down」はウェブサービスが使えない状態を表す。" },
    { en: "I use a smart speaker to play music.", ja: "音楽を流すのにスマートスピーカーを使っています。", tip: "「smart speaker」はAI機能付きスピーカー。「play music」で音楽を再生。" },
    { en: "He takes online classes on weekends.", ja: "彼は週末にオンラインの授業を受けます。", tip: "「online classes」はeラーニングや動画授業。「on weekends」は週末の習慣。" },
    { en: "I feel a little nervous before presentations.", ja: "プレゼンの前は少し緊張します。", tip: "「feel nervous」は「緊張する・不安になる」。「a little」で少し和らげる。" },
    { en: "She felt relieved when the exam was over.", ja: "試験が終わったとき、彼女はほっとしました。", tip: "「feel relieved」は「ほっとする・安心する」。" },
    { en: "I am really proud of what I have achieved.", ja: "私は自分の達成したことをとても誇りに思います。", tip: "「be proud of」は「〜を誇りに思う」。「what I have achieved」は関係詞節。" },
    { en: "He was disappointed by the results.", ja: "彼は結果にがっかりしました。", tip: "「be disappointed by」は「〜にがっかりする」。by は原因を示す。" },
    { en: "She felt overwhelmed with work.", ja: "彼女は仕事に圧倒されていました。", tip: "「overwhelmed with」は「〜に圧倒される・手に負えない」。" },
    { en: "I try to stay calm under pressure.", ja: "私はプレッシャーの下でも冷静でいようとします。", tip: "「stay calm under pressure」は「プレッシャー下でも落ち着いている」という表現。" },
    { en: "Taking a walk helps me clear my head.", ja: "散歩すると頭がすっきりします。", tip: "「clear my head」は「頭をすっきりさせる」というイディオム。" },
    { en: "She cried tears of joy at the wedding.", ja: "彼女は結婚式でうれし涙を流しました。", tip: "「tears of joy」は「うれし涙」という表現。" },
    { en: "I feel more confident when I am well-prepared.", ja: "よく準備しているとき、私はもっと自信が持てます。", tip: "「feel confident」は「自信を感じる」。「well-prepared」はハイフンつきの複合形容詞。" },
    { en: "It is important to talk about your feelings.", ja: "自分の気持ちを話すことは大切です。", tip: "「talk about your feelings」は「感情を言葉にする」ことの大切さを表す。" },
    { en: "He felt a sense of accomplishment after finishing the project.", ja: "プロジェクトを終えた後、彼は達成感を感じました。", tip: "「a sense of accomplishment」は「達成感」という表現。" },
    { en: "I get stressed when things do not go as planned.", ja: "物事が計画通りに進まないとストレスを感じます。", tip: "「get stressed」は「ストレスを感じる」。「as planned」は「計画通りに」。" },
    { en: "She feels lonely sometimes when living alone.", ja: "一人暮らしをしていると、ときどき孤独を感じます。", tip: "「feel lonely」は「孤独を感じる」。「sometimes」は頻度の副詞。" },
    { en: "I meditate every morning to reduce stress.", ja: "ストレスを減らすために毎朝瞑想します。", tip: "「meditate」は「瞑想する」。「to reduce stress」は目的を表す不定詞。" },
    { en: "He was excited about his new job.", ja: "彼は新しい仕事にわくわくしていました。", tip: "「be excited about」は「〜にわくわくする・興奮する」。" },
    { en: "Taking breaks improves your mental health.", ja: "休憩を取ることは精神的健康を改善します。", tip: "「taking breaks」は動名詞主語。「mental health」は「精神的健康」。" },
    { en: "I feel grateful for the support of my friends.", ja: "友人たちのサポートに感謝しています。", tip: "「feel grateful for」は「〜に感謝する」。" },
    { en: "She learned to set healthy boundaries.", ja: "彼女は健全な境界線を設定することを学びました。", tip: "「set boundaries」は「境界線を引く」。心理学でよく使われる表現。" },
    { en: "It is okay to ask for help when you need it.", ja: "必要なときに助けを求めることは大丈夫です。", tip: "「it is okay to」は「〜してもいい・大丈夫」という許可の表現。" },
    { en: "Laughter is the best medicine.", ja: "笑いは最善の薬です。", tip: "「laughter」は「笑い」。「the best medicine」は慣用句で笑いの健康効果を表す。" },
    { en: "Could you please say that again?", ja: "もう一度言っていただけますか？", tip: "「Could you please」は丁寧なお願いの形式。「say that again」はリピートの依頼。" },
    { en: "Would you mind turning down the volume?", ja: "音量を下げていただけますか？", tip: "「Would you mind -ing?」は丁寧な依頼表現。「turn down」は音量を下げる句動詞。" },
    { en: "I was wondering if you could help me.", ja: "お手伝いいただけたらと思っていたのですが。", tip: "「I was wondering if」は遠回しで丁寧な依頼の切り出し方。" },
    { en: "Please feel free to ask any questions.", ja: "遠慮なくどんな質問でもしてください。", tip: "「feel free to」は「自由に〜してください」という歓迎の表現。" },
    { en: "Thank you so much for your help.", ja: "ご助力に大変感謝します。", tip: "「so much」で感謝を強調。「for your help」は具体的な理由を表す。" },
    { en: "I apologize for the inconvenience.", ja: "ご不便をおかけして申し訳ありません。", tip: "「apologize for」は「〜について謝る」。「inconvenience」は「不便・迷惑」。" },
    { en: "Could I leave a message for him?", ja: "彼へのメッセージを残せますか？", tip: "「leave a message」は「伝言を残す」というビジネスでよく使う表現。" },
    { en: "May I come in?", ja: "入ってもよいですか？", tip: "「May I」は許可を求める丁寧な表現。ドアをノックした後に使う。" },
    { en: "Please let me know if you need anything.", ja: "何かお入り用でしたらお知らせください。", tip: "「let me know」は「知らせる」という使役表現。サービス業でも頻出。" },
    { en: "I would appreciate it if you could respond soon.", ja: "できるだけ早くご回答いただけますと幸いです。", tip: "「I would appreciate it if you could」は丁寧なビジネスメール表現。" },
    { en: "Excuse me, is this seat taken?", ja: "すみません、この席は空いていますか？", tip: "「Is this seat taken?」は座席が使用中か確認する表現。" },
    { en: "After you, please.", ja: "どうぞ、お先に。", tip: "相手を先に通す丁寧な表現。エレベーターやドアでよく使われる。" },
    { en: "Could you hold the door for me, please?", ja: "ドアを押さえていただけますか？", tip: "「hold the door」はドアが閉まらないように押さえること。" },
    { en: "I am sorry to bother you, but I have a question.", ja: "邪魔をして申し訳ありませんが、質問があります。", tip: "「I am sorry to bother you」は話しかける前の丁寧な前置き。" },
    { en: "Please take your time.", ja: "どうぞごゆっくりどうぞ。", tip: "「take your time」は急かさないという安心感を与える表現。" },
    { en: "Is there anything I can do to help?", ja: "何かお役に立てることはありますか？", tip: "「anything I can do」は「自分にできること」を申し出る表現。" },
    { en: "You are welcome to stay as long as you need.", ja: "必要な限り、いつでも滞在してください。", tip: "「you are welcome to」は「〜してよい・遠慮なくどうぞ」という表現。" },
    { en: "Thank you for waiting.", ja: "お待たせしました。", tip: "「Thank you for waiting」は待たせた後の定番のお礼。" },
    { en: "I appreciate your patience.", ja: "ご辛抱いただきありがとうございます。", tip: "「appreciate your patience」はビジネスや接客でよく使われる丁寧な表現。" },
    { en: "Please do not hesitate to contact me.", ja: "遠慮なくご連絡ください。", tip: "「do not hesitate to」は「ためらわずに〜してください」という丁寧な表現。" },
    { en: "We should reduce plastic waste.", ja: "プラスチックごみを減らすべきです。", tip: "「reduce」は「減らす」。「plastic waste」はプラスチックごみ。" },
    { en: "The cherry blossoms are beautiful this year.", ja: "今年の桜はきれいです。", tip: "「cherry blossoms」は桜の花。「this year」は今年を表す副詞句。" },
    { en: "I bring my own shopping bag to reduce waste.", ja: "ごみを減らすために自分のショッピングバッグを持参します。", tip: "「bring my own」は「自分の〜を持参する」。エコバッグの習慣表現。" },
    { en: "Climate change is a serious global issue.", ja: "気候変動は深刻なグローバル問題です。", tip: "「climate change」は気候変動。「global issue」はグローバルな問題。" },
    { en: "The river near my house is very clean.", ja: "家の近くの川はとてもきれいです。", tip: "「near my house」は「家の近くに」。「clean」は水質のよさを表す。" },
    { en: "We planted trees in the park last weekend.", ja: "先週末、公園に木を植えました。", tip: "「plant trees」は「木を植える」。環境活動の文脈でよく使われる。" },
    { en: "It is important to save water.", ja: "水を節約することは大切です。", tip: "「save water」は「水を節約する」。「it is important to」は重要性の表現。" },
    { en: "The air quality in the city has improved.", ja: "都市の大気の質が改善しました。", tip: "「air quality」は「大気質」。「has improved」は現在完了で改善を表す。" },
    { en: "I love hiking in the mountains.", ja: "山でハイキングするのが大好きです。", tip: "「hiking in the mountains」は「山岳ハイキング」。I love の後は動名詞。" },
    { en: "Recycling is a good habit to develop.", ja: "リサイクルは身につけるとよい習慣です。", tip: "「a good habit to develop」は「身につけるべきよい習慣」という不定詞修飾。" },
    { en: "The forest is home to many rare animals.", ja: "その森は多くの希少動物の生息地です。", tip: "「is home to」は「〜の生息地・本拠地である」という表現。" },
    { en: "We need to protect endangered species.", ja: "絶滅危惧種を守る必要があります。", tip: "「protect」は「保護する」。「endangered species」は絶滅危惧種。" },
    { en: "I use a refillable water bottle.", ja: "詰め替え可能なウォーターボトルを使っています。", tip: "「refillable」は「詰め替え可能な」。プラスチック削減の文脈で使われる。" },
    { en: "The sunset was absolutely stunning.", ja: "夕日はとても素晴らしかったです。", tip: "「absolutely stunning」は「まったく素晴らしい」という強調表現。" },
    { en: "It snowed heavily last night.", ja: "昨夜は大雪でした。", tip: "「snowed heavily」は「大雪が降った」。副詞 heavily が雪の多さを強調。" },
    { en: "The ocean is full of amazing creatures.", ja: "海は素晴らしい生き物でいっぱいです。", tip: "「be full of」は「〜でいっぱい」。「amazing creatures」は海洋生物。" },
    { en: "I am concerned about deforestation.", ja: "森林破壊を心配しています。", tip: "「be concerned about」は「〜について心配する」。「deforestation」は森林伐採。" },
    { en: "Solar panels are becoming more affordable.", ja: "ソーラーパネルがより手頃な価格になってきています。", tip: "「becoming more affordable」は「より手に入れやすくなる」という変化の表現。" },
    { en: "The typhoon caused a lot of damage.", ja: "台風が多くの被害をもたらしました。", tip: "「cause damage」は「被害をもたらす」。「a lot of damage」で被害の大きさを表す。" },
    { en: "We should switch to renewable energy.", ja: "再生可能エネルギーに切り替えるべきです。", tip: "「switch to」は「〜に切り替える」。「renewable energy」は再生可能エネルギー。" },
    { en: "I would like to schedule a meeting for next week.", ja: "来週の会議を予定したいのですが。", tip: "「I would like to」は丁寧な意思表示。「schedule a meeting」は会議を設定する。" },
    { en: "Could you send me the report by Friday?", ja: "金曜日までにレポートを送っていただけますか？", tip: "「by Friday」は「金曜日までに」という期限。「Could you」は丁寧な依頼。" },
    { en: "She was promoted to senior manager.", ja: "彼女はシニアマネージャーに昇進しました。", tip: "「be promoted to」は「〜に昇進する」。受動態で使われることが多い。" },
    { en: "We need to cut costs without losing quality.", ja: "品質を落とさずにコストを削減する必要があります。", tip: "「cut costs」は「コスト削減」。「without losing quality」は付帯状況を表す。" },
    { en: "The client was satisfied with our proposal.", ja: "クライアントは私たちの提案に満足しました。", tip: "「be satisfied with」は「〜に満足する」。ビジネスでよく使われる。" },
    { en: "He negotiated a better contract.", ja: "彼はより良い契約を交渉しました。", tip: "「negotiate」は「交渉する」。ビジネス英語の重要動詞。" },
    { en: "We launched a new product last quarter.", ja: "先四半期に新製品を発売しました。", tip: "「launch a product」は「製品を発売する」。「last quarter」は先四半期。" },
    { en: "She gave an impressive presentation.", ja: "彼女は印象的なプレゼンをしました。", tip: "「impressive」は「印象的な・感銘を与える」。プレゼン評価によく使う。" },
    { en: "I need to follow up on that email.", ja: "そのメールについてフォローアップする必要があります。", tip: "「follow up on」は「〜についてフォローする・確認する」。ビジネス頻出表現。" },
    { en: "The project is running behind schedule.", ja: "プロジェクトがスケジュールより遅れています。", tip: "「behind schedule」は「スケジュールより遅れて」。反対は「ahead of schedule」。" },
    { en: "We exceeded our sales targets this year.", ja: "今年は販売目標を超えました。", tip: "「exceed」は「超える・上回る」。「sales targets」は販売目標。" },
    { en: "She is responsible for training new staff.", ja: "彼女は新スタッフのトレーニングを担当しています。", tip: "「be responsible for」は「〜を担当・責任を持つ」。" },
    { en: "We need to align our strategies with the market.", ja: "市場に合わせて戦略を揃える必要があります。", tip: "「align with」は「〜に合わせる・一致させる」。ビジネス戦略の文脈で使われる。" },
    { en: "He took the initiative on the new project.", ja: "彼は新プロジェクトに対して自ら行動を起こしました。", tip: "「take the initiative」は「主体的に動く・率先する」というビジネス表現。" },
    { en: "The merger was announced last month.", ja: "合併は先月発表されました。", tip: "「merger」は「合併」。「was announced」は受動態で公式発表を表す。" },
    { en: "We are looking for candidates with leadership skills.", ja: "リーダーシップのある候補者を探しています。", tip: "「looking for candidates」は採用活動の表現。「leadership skills」はリーダーシップ能力。" },
    { en: "She built strong relationships with her clients.", ja: "彼女はクライアントと強固な関係を築きました。", tip: "「build strong relationships」は「強い関係を築く」。ビジネスの基本。" },
    { en: "I submitted the proposal before the deadline.", ja: "締め切り前に提案書を提出しました。", tip: "「before the deadline」は「締め切り前に」。「submitted」は submit の過去形。" },
    { en: "We need more transparency in our processes.", ja: "私たちのプロセスにはより多くの透明性が必要です。", tip: "「transparency」は「透明性」。「in our processes」はどこで必要かを示す。" },
    { en: "The team completed the task ahead of schedule.", ja: "チームはスケジュールより早くタスクを完了しました。", tip: "「ahead of schedule」は「予定より早く」。「behind schedule」の反対表現。" },
    { en: "I would like to express my sincere gratitude.", ja: "心からの感謝を申し上げたいと思います。", tip: "「sincere gratitude」は「心からの感謝」。フォーマルなスピーチで使われる。" },
    { en: "She demonstrated excellent problem-solving skills.", ja: "彼女は優れた問題解決スキルを発揮しました。", tip: "「demonstrate」は「示す・発揮する」。「problem-solving skills」はハイフンに注意。" },
    { en: "We are open to feedback from all team members.", ja: "すべてのチームメンバーからのフィードバックを歓迎しています。", tip: "「be open to」は「〜を受け入れる・開かれている」。" },
    { en: "The company is expanding its global presence.", ja: "その会社はグローバルな存在感を拡大しています。", tip: "「global presence」は「グローバルな存在感・展開」というビジネス表現。" },
    { en: "He has a proven track record in sales.", ja: "彼はセールスで実績があります。", tip: "「a proven track record」は「実績・証明された経歴」。履歴書・面接で使われる。" },
    { en: "Let us call it a day.", ja: "今日はここで終わりにしましょう。", tip: "「call it a day」は「その日の作業を終わりにする」というイディオム。" },
    { en: "It is raining cats and dogs outside.", ja: "外は土砂降りです。", tip: "「raining cats and dogs」は「土砂降りの雨」というイディオム。" },
    { en: "Break a leg!", ja: "頑張って！（Good luck!）", tip: "舞台や試験前に使う「頑張って」の表現。直訳は「足を折れ」だが縁起を担ぐ言い回し。" },
    { en: "That is a piece of cake.", ja: "それはとても簡単です。", tip: "「a piece of cake」は「簡単なこと」というイディオム。" },
    { en: "He is under the weather today.", ja: "彼は今日、体調が優れません。", tip: "「under the weather」は「体調が悪い・気分が優れない」というイディオム。" },
    { en: "She hit the nail on the head.", ja: "彼女はまさに核心をついた。", tip: "「hit the nail on the head」は「核心をつく・ずばり当てる」というイディオム。" },
    { en: "I am on the fence about this decision.", ja: "この決断については迷っています。", tip: "「on the fence」は「どちらか決めかねている・迷っている」というイディオム。" },
    { en: "We are in the same boat.", ja: "私たちは同じ立場にいます。", tip: "「in the same boat」は「同じ状況・境遇にいる」という表現。" },
    { en: "He burned his bridges with his former employer.", ja: "彼は前の雇用主との関係を断ち切りました。", tip: "「burn bridges」は「関係を断ち切る・退路を絶つ」というイディオム。" },
    { en: "She has a lot on her plate right now.", ja: "彼女は今、やることがたくさんあります。", tip: "「have a lot on one's plate」は「多くの仕事・責任を抱えている」という表現。" },
    { en: "Let us think outside the box.", ja: "固定観念にとらわれずに考えましょう。", tip: "「think outside the box」は「型にはまらない発想で考える」というビジネス表現。" },
    { en: "He gave me the cold shoulder.", ja: "彼は私を無視しました。", tip: "「give the cold shoulder」は「無視する・冷たくあしらう」というイディオム。" },
    { en: "We need to get the ball rolling.", ja: "物事を始める必要があります。", tip: "「get the ball rolling」は「物事を始める・スタートさせる」という表現。" },
    { en: "She is a night owl.", ja: "彼女は夜型人間です。", tip: "「night owl」は「夜更かしをする人・夜型の人」というイディオム。" },
    { en: "It takes two to tango.", ja: "喧嘩両成敗です。", tip: "「it takes two to tango」は「問題には双方に責任がある」という表現。" },
    { en: "He is a quick learner.", ja: "彼は覚えが早いです。", tip: "「quick learner」は「覚えの速い人」。面接でよく使われる自己アピール表現。" },
    { en: "Time flies when you are having fun.", ja: "楽しいとき、時間が経つのは早いです。", tip: "「time flies」は「時間が飛ぶように過ぎる」。楽しい時の感覚を表す。" },
    { en: "Better late than never.", ja: "遅れてもやらないよりはましです。", tip: "「better late than never」は「遅くとも来ないよりまし」という諺。" },
    { en: "The early bird catches the worm.", ja: "早起きは三文の徳。", tip: "「the early bird catches the worm」は早起き・早い行動の有利さを表す諺。" },
    { en: "Actions speak louder than words.", ja: "言葉より行動が重要です。", tip: "「actions speak louder than words」は「行動は言葉よりも雄弁」という有名な諺。" },
    { en: "Every cloud has a silver lining.", ja: "どんな困難にも希望の光があります。", tip: "「silver lining」は暗い雲の縁に見える銀色の光。困難の中にも希望があるという意味。" },
    { en: "Do not judge a book by its cover.", ja: "見かけで判断してはいけません。", tip: "「judge a book by its cover」は「外見だけで判断する」という表現。否定形で使われる。" },
    { en: "Two heads are better than one.", ja: "三人寄れば文殊の知恵。", tip: "「two heads are better than one」は「一人より二人の方が知恵が出る」という表現。" },
    { en: "I am all ears.", ja: "喜んで聞きます。", tip: "「all ears」は「聞く準備ができている・熱心に聞いている」という表現。" },
    { en: "It is a blessing in disguise.", ja: "それは思わぬ幸運です。", tip: "「a blessing in disguise」は「一見不運に見えてじつは幸運なこと」というイディオム。" },
    { en: "She practices yoga three times a week.", ja: "彼女は週3回ヨガを練習します。", tip: "「practice yoga」は「ヨガをする」。「three times a week」は頻度表現。" },
    { en: "He joined a local soccer team.", ja: "彼は地元のサッカーチームに入りました。", tip: "「join a team」は「チームに加わる」。「local」は「地元の・近所の」。" },
    { en: "I started learning the guitar last year.", ja: "去年ギターを弾き始めました。", tip: "「start -ing」は「〜し始める」。楽器には the をつけることが多い。" },
    { en: "She reads at least one book a month.", ja: "彼女は月に少なくとも1冊本を読みます。", tip: "「at least」は「少なくとも」。「a month」は「月に」という頻度表現。" },
    { en: "He won first place in the marathon.", ja: "彼はマラソンで1位になりました。", tip: "「win first place」は「1位になる」。「in the marathon」は大会の中での。" },
    { en: "I enjoy painting on weekends.", ja: "週末に絵を描くのを楽しんでいます。", tip: "「enjoy + -ing」は「〜することを楽しむ」。paint は「絵を描く」。" },
    { en: "She is training for a half marathon.", ja: "彼女はハーフマラソンに向けてトレーニングしています。", tip: "「train for」は「〜に向けて訓練・練習する」。" },
    { en: "We went camping by the lake.", ja: "湖のほとりでキャンプをしました。", tip: "「camping by the lake」は「湖のそばでキャンプ」。by は「〜のそばに」。" },
    { en: "I collect vintage postcards as a hobby.", ja: "趣味でヴィンテージのポストカードを集めています。", tip: "「collect」は「集める・コレクションする」。「as a hobby」は「趣味として」。" },
    { en: "He watches sports every weekend.", ja: "彼は毎週末スポーツを観ます。", tip: "「watch sports」はスポーツ観戦。「every weekend」は毎週末の習慣。" },
    { en: "She took up photography last spring.", ja: "去年の春に写真を始めました。", tip: "「take up」は「（趣味を）始める」という句動詞。" },
    { en: "I go cycling along the river on Sundays.", ja: "日曜日に川沿いをサイクリングします。", tip: "「go cycling」は「サイクリングに行く」。「along the river」は川沿いに。" },
    { en: "He scored three goals in the match.", ja: "彼はその試合で3点を取りました。", tip: "「score a goal」は「ゴールを決める」。「in the match」はその試合での。" },
    { en: "She dances ballet professionally.", ja: "彼女はプロとしてバレエを踊っています。", tip: "「professionally」は「プロとして・職業的に」。" },
    { en: "I started a garden on my balcony.", ja: "バルコニーに庭を作り始めました。", tip: "「start a garden」は「庭づくりを始める」。「on my balcony」はバルコニーに。" },
    { en: "He is really good at chess.", ja: "彼はチェスがとても得意です。", tip: "「be good at」は「〜が得意」。チェスは世界共通のボードゲーム。" },
    { en: "We played tennis at the park.", ja: "公園でテニスをしました。", tip: "スポーツの名前には通常 a/the をつけない。「played tennis」と直接使う。" },
    { en: "She finished the puzzle in two hours.", ja: "彼女は2時間でパズルを完成させました。", tip: "「finish the puzzle」はパズルを完成させる。「in two hours」は所要時間。" },
    { en: "I practice swimming twice a week.", ja: "週2回水泳を練習します。", tip: "「twice a week」は「週2回」。once, twice, three times の順に覚えよう。" },
    { en: "He loves to try new recipes at home.", ja: "彼は家で新しいレシピを試すのが大好きです。", tip: "「try new recipes」は「新しいレシピを試す」。料理が趣味の表現。" },
    { en: "She knits scarves for her friends.", ja: "彼女は友達のためにスカーフを編みます。", tip: "「knit scarves」はスカーフを編む。「for her friends」は誰のために作るか。" },
    { en: "I joined a book club at work.", ja: "職場で読書クラブに入りました。", tip: "「book club」は「読書会」。「at work」は「職場で」。" },
    { en: "He runs a personal blog about travel.", ja: "彼は旅行についての個人ブログを運営しています。", tip: "「run a blog」は「ブログを運営する」。「personal blog」は個人ブログ。" },
    { en: "She is learning how to surf.", ja: "彼女はサーフィンの仕方を学んでいます。", tip: "「learn how to」は「〜のやり方を学ぶ」。現在進行形で学習中を表す。" },
    { en: "We play board games on rainy days.", ja: "雨の日はボードゲームをします。", tip: "「on rainy days」は「雨の日に」。「board games」はボードゲームの総称。" },
    { en: "I need to buy a new pair of shoes.", ja: "新しい靴を買う必要があります。", tip: "「a pair of shoes」は「一足の靴」。靴は常に a pair で数える。" },
    { en: "She always carries an umbrella.", ja: "彼女はいつも傘を持ち歩きます。", tip: "「carry an umbrella」は「傘を持ち歩く」。carry は「持ち運ぶ」。" },
    { en: "The flight was delayed by two hours.", ja: "フライトは2時間遅れました。", tip: "「be delayed by」は「〜だけ遅延する」。by は遅れの程度を示す。" },
    { en: "I always check the weather before going out.", ja: "外出前にいつも天気を確認します。", tip: "「check the weather」は天気確認。「before going out」は外出前に。" },
    { en: "She bought a souvenir for her family.", ja: "彼女は家族へのお土産を買いました。", tip: "「souvenir」は「お土産・記念品」。フランス語由来の言葉。" },
    { en: "I prefer window seats on airplanes.", ja: "飛行機では窓側の座席が好きです。", tip: "「prefer A over B」は「BよりAが好き」。「window seat」は窓際の席。" },
    { en: "He got lost in the city center.", ja: "彼は市街地で迷子になりました。", tip: "「get lost」は「道に迷う・迷子になる」という表現。" },
    { en: "She checked in at the hotel early.", ja: "彼女は早めにホテルにチェックインしました。", tip: "「check in at」は「〜にチェックインする」。at で場所を示す。" },
    { en: "We took a guided tour of the museum.", ja: "博物館のガイドツアーを受けました。", tip: "「take a guided tour」は「ガイド付きツアーに参加する」。" },
    { en: "The train was packed this morning.", ja: "今朝、電車は混んでいました。", tip: "「packed」は「満員の・混んでいる」という表現。通勤ラッシュに使われる。" },
    { en: "I reserved a table for two.", ja: "2人分のテーブルを予約しました。", tip: "「reserve a table」はレストランの予約。「for two」は人数。" },
    { en: "She spent a week in Barcelona.", ja: "彼女はバルセロナで1週間過ごしました。", tip: "「spend time in + 場所」は「〜の場所で時間を過ごす」。" },
    { en: "He exchanged currency at the airport.", ja: "彼は空港で外貨を両替しました。", tip: "「exchange currency」は「通貨を両替する」。旅行の定番表現。" },
    { en: "I packed light for my weekend trip.", ja: "週末旅行のために荷物を軽くまとめました。", tip: "「pack light」は「荷物を少なくまとめる」という表現。" },
    { en: "She met some interesting people on the train.", ja: "電車の中でおもしろい人たちに出会いました。", tip: "「met」は meet の過去形。「interesting people」は興味深い人々。" },
    { en: "We rented a car to explore the countryside.", ja: "田舎を探索するために車を借りました。", tip: "「rent a car」は「車を借りる」。「explore the countryside」は田舎を探索する。" },
    { en: "I forgot to bring my passport.", ja: "パスポートを持ってくるのを忘れました。", tip: "「forgot to bring」は「持ってくるのを忘れた」。to 不定詞に注意。" },
    { en: "The hotel room had a great view.", ja: "ホテルの部屋からの眺めが素晴らしかったです。", tip: "「had a great view」は「素晴らしい眺めがあった」。" },
    { en: "He asked for directions at the station.", ja: "彼は駅で道を聞きました。", tip: "「ask for directions」は「道を聞く」。観光地で使える表現。" },
    { en: "She took hundreds of photos during the trip.", ja: "旅行中に何百枚もの写真を撮りました。", tip: "「hundreds of」は「何百もの」。「took photos」は「写真を撮った」。" },
    { en: "I love trying local food when I travel.", ja: "旅行するとき、地元の食べ物を試すのが大好きです。", tip: "「local food」は「地元の食べ物・郷土料理」。旅行の楽しみのひとつ。" },
    { en: "We stayed at a small bed and breakfast.", ja: "小さなベッドアンドブレックファストに宿泊しました。", tip: "「bed and breakfast（B&B）」は朝食付きの小さな宿。欧州に多い。" },
    { en: "The customs process took a long time.", ja: "税関の手続きに長い時間がかかりました。", tip: "「customs process」は「税関の手続き」。「took a long time」は時間がかかった。" },
    { en: "She felt homesick during her study abroad.", ja: "留学中、彼女はホームシックになりました。", tip: "「feel homesick」は「ホームシックになる・家が恋しくなる」。" },
  ];

  function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  var sessionSentences = [];
  var currentIndex = 0;
  var isStarted = false;

  function startPractice() {
    isStarted = true;
    currentIndex = 0;
    sessionSentences = shuffleArray(ALL_SENTENCES).slice(0, 30);
    document.getElementById('start-wrap').classList.add('hidden');
    document.getElementById('practice-wrap').classList.add('show');
    renderSentence();
  }

  function renderSentence() {
    var total = sessionSentences.length;
    var s = sessionSentences[currentIndex];
    var setNum = Math.floor(currentIndex / 5) + 1;
    var posInSet = (currentIndex % 5) + 1;

    document.getElementById('sentence-en').textContent = s.en;
    document.getElementById('sentence-ja').textContent = s.ja;
    document.getElementById('sentence-tip').textContent = s.tip;
    document.getElementById('set-label').textContent = 'SET ' + setNum;
    document.getElementById('sentence-num').textContent = posInSet + '文目 / 5文';
    document.getElementById('progress-count').textContent = (currentIndex + 1) + ' / ' + total;
    document.getElementById('set-label-top').textContent = 'セット ' + setNum + ' / 6';
    document.getElementById('progress-bar').style.width = ((currentIndex + 1) / total * 100) + '%';

    var isLast = currentIndex === total - 1;
    document.getElementById('btn-next').textContent = isLast ? '完了 ✓' : '次へ →';
  }

  function nextSentence() {
    if (currentIndex < sessionSentences.length - 1) {
      currentIndex++;
      renderSentence();
    } else {
      document.getElementById('practice-wrap').classList.remove('show');
      document.getElementById('complete-screen').classList.add('show');
    }
  }

  function retryPractice() {
    currentIndex = 0;
    sessionSentences = shuffleArray(ALL_SENTENCES).slice(0, 30);
    document.getElementById('complete-screen').classList.remove('show');
    document.getElementById('practice-wrap').classList.add('show');
    renderSentence();
  }
</script>

</body>
</html>
